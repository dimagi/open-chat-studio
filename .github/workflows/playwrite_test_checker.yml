name: Playwrite Test Checker

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  agent_tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: open_chat_studio
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DJANGO_DATABASE_USER: postgres
      DJANGO_DATABASE_PASSWORD: postgres_password
      SECRET_KEY: secret-test-key
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv
          uv sync --locked --dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: uv run python manage.py migrate

      - name: Seed database
        run: uv run python manage.py bootstrap_data --email tester@playwright.com --password My0riginalP@ssw0rd! --team-slug agent --team-name Agent --superuser --reset

      - name: Start Celery worker
        run: uv run celery -A config worker -l INFO --pool=solo &

      - name: Wait for Celery worker to be ready
        run: |
          for i in $(seq 1 15); do
            if uv run celery -A config inspect ping > /dev/null 2>&1; then
              echo "Celery worker is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Celery worker failed to start"
          exit 1

      - name: Start Django server
        run: uv run python manage.py runserver 0.0.0.0:8000 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/ > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run Playwright tests
        id: playwright
        env:
          REUSE_SERVER: '1'
        run: npx playwright test
        continue-on-error: true

      - name: Extract failing test names
        id: failures
        if: steps.playwright.outcome == 'failure'
        run: |
          FAILING=$(jq -r '.suites[] | .title as $file | .. | .specs? // empty | .[] | select(.ok == false) | "- \($file) > \(.title)"' playwright-results.json)
          echo "failing_tests<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILING" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Claude test healer
        id: claude_repair
        if: steps.playwright.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The following Playwright tests failed:
            ${{ steps.failures.outputs.failing_tests }}

            Use the playwright-test-healer agent to investigate and fix them.
            The server is running on http://localhost:8000.

      - name: Create PR with test fixes
        if: "steps.playwright.outcome == 'failure' && !contains(steps.claude_repair.outputs.structured_output, 'STATUS: WORKFLOW_FAILED')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet HEAD -- playwright/; then
            echo "No test changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            BRANCH="fix/playwright-tests-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add playwright/
            git commit -m "fix: auto-update Playwright tests to match current UI"
            git push origin "$BRANCH"
            gh pr create \
              --title "fix: auto-update Playwright tests" \
              --body "Automated Playwright test fixes generated by the site testing workflow."
          fi

      - name: Fail if core workflows are broken
        if: steps.playwright.outcome == 'failure'
        run: |
          if echo "${{ steps.claude_repair.outputs.structured_output }}" | grep -q "STATUS: WORKFLOW_FAILED"; then
            echo "One or more core workflows are broken — failing CI"
            exit 1
          fi

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
