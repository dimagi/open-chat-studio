name: Publish Package

on:
  push:
    tags:
      - 'w_v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: components/chat_widget/pnpm-lock.yaml

      # Dependencies are managed with pnpm, but the package is published with npm
      # so it keeps using npm's OIDC trusted publishing (pnpm's OIDC support is incomplete).
      - name: Update npm
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
        working-directory: ./components/chat_widget
      - run: pnpm run build
        working-directory: ./components/chat_widget
      - run: npm publish
        working-directory: ./components/chat_widget
