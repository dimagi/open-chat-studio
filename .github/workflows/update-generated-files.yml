# This workflow automatically fixes and regenerates files when Python code changes:
# - Ruff safe fixes and formatting
# - API schema (api-schemas/v1.yml) when API-related code changes
# - Django migrations when model files change
# Ruff runs first so any regenerated files are already formatted. All changes are
# committed back to the PR branch in a single commit if anything changed. This keeps
# generated files in sync with code and prevents avoidable CI failures.

name: Update Generated Files
permissions:
  contents: write

on:
  pull_request:
    paths:
      - '**.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-generated-files:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHON_VERSION: '3.13'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      # Push with a GitHub App token (not GITHUB_TOKEN) so the commit re-triggers CI.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.OCS_AGENT_APP_ID }}
          private-key: ${{ secrets.OCS_AGENT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv venv
          uv sync --locked --dev

      - name: Apply ruff fixes
        # --exit-zero: apply every available fix but never fail the step on
        # leftover unfixable violations, so schema/migration generation and the
        # commit still run. The code-style job in lint_and_test.yml is the lint gate.
        run: |
          uv run ruff check --fix --exit-zero .
          uv run ruff format .

      - name: Generate API Schema
        env:
          DJANGO_DATABASE_USER: postgres
          DJANGO_DATABASE_PASSWORD: postgres_password
          SECRET_KEY: secret-test-key
        run: |
          uv run python manage.py spectacular --api-version v1 --file api-schemas/v1.yml --validate
          uv run python manage.py spectacular --api-version v2 --file api-schemas/v2.yml --validate

      - name: Create Missing Migrations
        env:
          SECRET_KEY: secret-test-key
        run: uv run python manage.py makemigrations --noinput

      - name: Check for changes
        id: verify-changed-files
        run: |
          git add -A
          if git diff --cached --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Apply ruff fixes and update generated files"
          git push
