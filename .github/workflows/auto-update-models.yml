name: Auto Update LLM Models

# Daily check against llm-stats.com (via the zeroeval Stats API) for newly
# released LLM models from providers we use in OCS. When a candidate is found,
# Claude Code is invoked to add the model following docs/developer_guides/managing_models.md
# and open a PR.
#
# Model metadata is sourced from https://llm-stats.com (via api.zeroeval.com).

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window in days (max 30)'
        required: false
        default: '1'
        type: string

concurrency:
  group: auto-update-models
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch-updates:
    runs-on: ubuntu-latest
    outputs:
      has_models: ${{ steps.fetch.outputs.has_models }}
      model_count: ${{ steps.fetch.outputs.model_count }}
      model_ids: ${{ steps.fetch.outputs.model_ids }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Fetch and enrich model candidates
        id: fetch
        env:
          LLM_STATS_BEARER_TOKEN: ${{ secrets.LLM_STATS_BEARER_TOKEN }}
        run: |
          python3 scripts/fetch_model_updates.py \
            --bearer-token "$LLM_STATS_BEARER_TOKEN" \
            --days "${{ inputs.days || '1' }}" \
            --repo-root . \
            --output candidate_models.json

      - name: Upload candidate models payload
        if: steps.fetch.outputs.has_models == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: candidate-models
          path: candidate_models.json
          retention-days: 7

  update-models:
    needs: fetch-updates
    if: needs.fetch-updates.outputs.has_models == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DJANGO_DATABASE_USER: postgres
      DJANGO_DATABASE_PASSWORD: postgres_password
      SECRET_KEY: secret-test-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download candidate models payload
        uses: actions/download-artifact@v8
        with:
          name: candidate-models

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv
          uv sync --locked --dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install Node dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create branch
        id: branch
        run: |
          BRANCH_NAME="auto-models/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are adding newly released LLM models to Open Chat Studio.

            ## Source
            `scripts/fetch_model_updates.py` has already fetched candidates from the
            llm-stats.com Stats API, deduped them against models already registered
            in `apps/service_providers/llm_service/default_models.py`, and resolved
            pricing from llm-stats.com (primary) and LiteLLM (fallback).  The
            structured result is at `./candidate_models.json`.

            ${{ needs.fetch-updates.outputs.model_count }} new model(s) need
            registering: ${{ needs.fetch-updates.outputs.model_ids }}

            ## candidate_models.json structure
            - `new_models[]` — models not yet in `DEFAULT_LLM_PROVIDER_MODELS`.
              Each entry includes:
              - `id` — the model name string to use in `default_models.py`
              - `org` — the llm-stats.com organisation id
              - `ocs_providers` — provider keys to register this model under
              - `context_window` — use as `token_limit` (may be null → see below)
              - `source_url` — llm-stats.com page for this model
              - `sources` — provider doc URLs (api_ref, paper, etc.) to consult
                when context_window or other info is missing
              - `pricing.has_pricing` — true when pricing was resolved
              - `pricing.rates` — per-1K-token prices already in OCS units
              - `pricing.llm_pricing_entries` — ready-to-merge entries for
                `apps/cost_tracking/seed_data/llm_pricing.json` (providers not
                yet in that file); append these verbatim and run the linter
              - `already_registered_providers` — providers where this model
                is partially already registered (still register for the rest)
              - `already_priced_providers` — providers already in llm_pricing.json
            - `already_registered[]` — models fully registered in all providers;
              no action needed.
            - `unpriced_models[]` — new models where neither llm-stats nor LiteLLM
              had pricing data; must be flagged in `## Needs follow-up`.
            - `pricing_entries[]` — flat list of all new pricing entries; included
              for convenience but the per-model `llm_pricing_entries` arrays are
              authoritative.

            ## Your task

            For each model in `new_models`:

            1. **Decide** whether to register it:
               - Skip models that don't suit OCS (embedding-only, image-only,
                 deprecated preview already superseded by a GA model).
               - Register under each provider in `ocs_providers` that is not
                 already in `already_registered_providers`.

            2. **Register** it in `DEFAULT_LLM_PROVIDER_MODELS` following
               `docs/developer_guides/managing_models.md`:
               - Use `context_window` as `token_limit`.  If null, use 128000 as a
                 placeholder and add a comment:
                 `# TODO: verify token_limit — context_window not available from source`
                 then consult `sources` (use WebFetch on `api_ref` / provider docs)
                 and flag in `## Needs follow-up`.
               - Pick an existing parameters class that matches the model family.
                 Create a new one only when no existing class fits.
               - Create a Django migration calling `llm_model_migration()`.
               - Strip earlier `llm_model_migration()` calls from older migrations
                 so each only runs once.

            3. **Add pricing** by appending `pricing.llm_pricing_entries` from
               `candidate_models.json` verbatim to
               `apps/cost_tracking/seed_data/llm_pricing.json`.  Only skip entries
               whose `provider_type` appears in `already_priced_providers` — those
               are already in the file.  For unpriced models, flag them (do not
               guess prices).

            4. **Lint and test**:
               - `uv run ruff check apps/service_providers/ apps/cost_tracking/ --fix`
               - `uv run ruff format apps/service_providers/ apps/cost_tracking/`
               - `uv run pytest apps/service_providers/tests/test_default_models.py -v`

            5. **Commit** and **open a PR** against `main` using
               `.github/pull_request_template.md`:
               - Title: `Auto: add new LLM models from llm-stats.com (YYYY-MM-DD)`
               - Body must list each added model with its `source_url`, include
                 `Model metadata sourced from [llm-stats.com](https://llm-stats.com)
                 via the zeroeval Stats API.`, and a `## Needs follow-up` section
                 for any unpriced or incomplete models.
               - Check "The migrations are backwards compatible" — `llm_model_migration()`
                 is additive.
               - Apply `claude` and `auto-models` labels if they exist.

            6. If after step 1 nothing needs adding, do **not** open an empty PR —
               print a summary and exit.

            7. **Always** write `./decision_report.md` before exiting:

               ```markdown
               # Auto Update Models — Decision Report

               **Run date (UTC):** <YYYY-MM-DD HH:MM>
               **Candidates considered:** <count>
               **Outcome:** <PR opened | Nothing to add | Error>
               **PR:** <PR URL or n/a>

               ## Per-model decisions

               ### `<model-id>` (org: `<org>`)
               - **Verdict:** Added | Skipped | Needs follow-up
               - **Mapped providers:** <providers>  (if added)
               - **Reason:** <one-sentence rationale>
               - **Source:** <source_url>

               ## Notes
               <edge cases, sources consulted, decisions deferred>
               ```

               Every entry in `new_models` and `already_registered` in
               `candidate_models.json` must appear here with an explicit verdict.

            Branch: ${{ steps.branch.outputs.branch_name }} (already created and
            checked out).
          claude_args: |
            --allowedTools "Bash(uv run:*),Bash(uv sync:*),Bash(python manage.py:*),Bash(npm run lint:*),Bash(ls:*),Bash(cat:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git checkout:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh label:*),Read,Write,Edit,Glob,Grep,WebFetch"

      - name: Append decision report to step summary
        if: always()
        run: |
          if [ -f decision_report.md ]; then
            cat decision_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Auto Update Models — Decision Report"
              echo ""
              echo "**No decision report was produced.** Claude Code exited without"
              echo "writing \`decision_report.md\`. Check the Claude step logs above"
              echo "for what happened."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
