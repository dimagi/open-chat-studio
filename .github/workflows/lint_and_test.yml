name: Lint and Test
on:
  pull_request:
    paths-ignore:
      - 'components/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.coderabbit.yaml'
      - 'locust/**'
      - 'cypress/**'
      - 'cypress.config.ts'
      - 'cypress.env.json'
      - 'Dockerfile'
      - 'docker-compose-dev.yml'
      - 'heroku.yml'
      - 'app.json'
      - 'scripts/**'
      - 'media/**'

  push:
    branches:
      - main
    paths-ignore:
      - 'components/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.coderabbit.yaml'
      - 'locust/**'
      - 'cypress/**'
      - 'cypress.config.ts'
      - 'cypress.env.json'
      - 'Dockerfile'
      - 'docker-compose-dev.yml'
      - 'heroku.yml'
      - 'app.json'
      - 'scripts/**'
      - 'media/**'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Install dependencies
        run: npm ci
      - name: Build front end
        run: npm run build
      - name: Check types
        run: npm run type-check

  code-style:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          npm ci
          sudo apt-get install -y ripgrep
          uv venv
          uv sync --locked --dev
      - id: file_changes
        uses: trilom/file-changes-action@v1.2.4
      - id: changed_files
        name: Build space-separated file list
        env:
          CHANGED_FILES: ${{ steps.file_changes.outputs.files }}
        run: |
          files=$(printf '%s' "$CHANGED_FILES" | jq -r '.[]' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
      - name: Run pre-commit hooks
        uses: j178/prek-action@v2
        with:
          extra-args: --files ${{ steps.changed_files.outputs.files }}

  type-check:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv venv
          uv sync --locked --dev
      - name: Run ty type checker
        run: uv run ty check apps/

  inline-imports:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - id: file_changes
        uses: trilom/file-changes-action@v1.2.4
      - id: py_files
        name: Filter changed Python files
        env:
          CHANGED_FILES: ${{ steps.file_changes.outputs.files }}
        run: |
          files=$(printf '%s' "$CHANGED_FILES" | jq -r '.[]' | grep -E '^apps/.*\.py$' | tr '\n' ' ' || true)
          echo "files=$files" >> "$GITHUB_OUTPUT"
      - name: Set up Python
        if: steps.py_files.outputs.files != ''
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
        if: steps.py_files.outputs.files != ''
        with:
          enable-cache: true
      - name: Install dependencies
        if: steps.py_files.outputs.files != ''
        run: |
          uv venv
          uv sync --locked --dev
      - name: Check inline imports in changed files
        if: steps.py_files.outputs.files != ''
        env:
          SECRET_KEY: secret-test-key
          CHANGED_FILES: ${{ steps.py_files.outputs.files }}
        run: |
          read -r -a files <<< "$CHANGED_FILES"
          uv run python scripts/check_inline_imports.py apps --files "${files[@]}"

  check-uv-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
      - name: Check lockfile
        run: uv lock --check

  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_INITDB_ARGS: "--no-sync"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data
        ports:
          - 5432:5432
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Dependencies
        run: |
          uv venv
          uv sync --locked --dev
      - name: Configure Postgres for performance
        run: |
          PGPASSWORD=postgres_password psql -h localhost -U postgres \
            -c "ALTER SYSTEM SET fsync = off;" \
            -c "ALTER SYSTEM SET synchronous_commit = off;" \
            -c "ALTER SYSTEM SET full_page_writes = off;" \
            -c "ALTER SYSTEM SET checkpoint_completion_target = 0.9;" \
            -c "SELECT pg_reload_conf();"
      - name: Set coverage flags
        id: cov_flags
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "flags=--cov --cov-report=xml" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - name: Run Tests
        env:
          DJANGO_DATABASE_USER: postgres
          DJANGO_DATABASE_PASSWORD: postgres_password
          SECRET_KEY: secret-test-key
          PYTHONWARNINGS: default
        run: uv run pytest -n auto ${{ steps.cov_flags.outputs.flags }} --junitxml=junit.xml -o junit_family=legacy

      - name: Upload results to Codecov
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
