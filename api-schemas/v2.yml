components:
  schemas:
    ApiSchemaDigest:
      type: object
      description: A custom action's OpenAPI schema reduced to just the paths of the
        selected operations.
      properties:
        paths:
          type: array
          items:
            type: string
      required:
      - paths
    Assistant:
      type: object
      description: Assistant fields. ``instructions`` and ``assistant_id`` are exposed
        on purpose.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        assistant_id:
          type: string
          maxLength: 255
        instructions:
          type: string
        builtin_tools:
          type: array
          items:
            type: string
            maxLength: 128
        tools:
          type: array
          items:
            type: string
            maxLength: 128
        temperature:
          type: number
          format: double
          maximum: 2.0
          minimum: 0.0
        top_p:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
      required:
      - assistant_id
      - id
      - instructions
      - name
    AssistantNodeParams:
      type: object
      properties:
        tag:
          type: string
          description: Tag applied to this node's output message; blank means no tag.
        citations_enabled:
          type: boolean
          description: Include cited sources in responses.
        input_formatter:
          type: string
          description: Optional wrapper for the user input; use ``{input}`` as the
            placeholder.
    AuthProviderExportItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        config:
          type: string
          description: Sealed under the team's public key (base64, RSA-OAEP).
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        type:
          $ref: '#/components/schemas/AuthProviderExportItemTypeEnum'
        name:
          type: string
          maxLength: 255
      required:
      - config
      - created_at
      - id
      - name
      - type
      - updated_at
    AuthProviderExportItemTypeEnum:
      enum:
      - basic
      - api_key
      - bearer
      - commcare
      type: string
      description: |-
        * `basic` - Basic
        * `api_key` - API Key
        * `bearer` - Bearer Auth
        * `commcare` - CommCare
    AuthProviderExportPage:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/AuthProviderExportItem'
      required:
      - cursor
      - has_more
      - results
    BlankEnum:
      enum:
      - ''
    BooleanNodeParams:
      type: object
      properties:
        input_equals:
          type: string
          description: Value the node input is compared against to pick the true/false
            branch.
        tag_output_message:
          type: boolean
          description: Tag the output message with the selected route.
    Channel:
      type: object
      description: |-
        A channel's ``platform``, ``name``, messaging provider and platform-specific identifier fields.

        ``extra_data`` holds free-form auth material and is excluded entirely. Each platform's non-secret
        identifying field(s) are surfaced as top-level keys, present only for the platform they belong to:
        ``number`` (WhatsApp), ``page_id`` (Facebook), ``sureadhere_tenant_id`` (SureAdhere),
        ``commcare_connect_bot_name`` (CommCare Connect), and ``allow_all_domains`` / ``allowed_domains``
        (Embedded Widget). Platforms whose identifier is itself a secret (Telegram's ``bot_token``, the
        widget's ``widget_token``) surface none.
      properties:
        platform:
          $ref: '#/components/schemas/PlatformEnum'
        name:
          type: string
          description: The name of this channel
          maxLength: 255
        messaging_provider:
          allOf:
          - $ref: '#/components/schemas/Provider'
          nullable: true
        number:
          type: string
          nullable: true
          readOnly: true
        page_id:
          type: string
          nullable: true
          readOnly: true
        sureadhere_tenant_id:
          type: string
          nullable: true
          readOnly: true
        commcare_connect_bot_name:
          type: string
          nullable: true
          readOnly: true
        allow_all_domains:
          type: boolean
          readOnly: true
        allowed_domains:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - messaging_provider
      - name
    ChatExportPage:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/ChatSync'
      required:
      - cursor
      - has_more
      - results
    ChatSync:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 128
        translated_languages:
          type: array
          items:
            type: string
            maxLength: 3
          nullable: true
          description: List of language codes for which translated text is available
        metadata: {}
      required:
      - created_at
      - id
      - updated_at
    Chatbot:
      type: object
      description: |-
        Basic chatbot fields for the list and retrieve endpoints.

        The full configuration is served by the ``inspect`` action instead (ADR-0024). v2 calls these
        "chatbots" rather than "experiments" (ADR-0023).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        url:
          type: string
          format: uri
          readOnly: true
          title: API URL
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ChatbotVersion'
      required:
      - id
      - name
      - url
      - versions
    ChatbotInspect:
      type: object
      description: |-
        The whole chatbot configuration in one read-only response (ADR-0024).

        The chatbot's fields sit at the top level — there's no wrapper key around them. Expects the
        resolved :class:`~apps.experiments.models.Experiment`, and needs a ``fetcher`` in its context.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        description:
          type: string
          nullable: true
          title: A longer description of the experiment.
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_unreleased:
          type: boolean
          description: True for the working (draft) version that has not been released;
            never the published one.
        is_published_version:
          type: boolean
          description: True for the version currently served to participants (the
            live default).
        version_description:
