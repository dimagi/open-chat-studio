          type: integer
          readOnly: true
        is_global:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          description: The name of the synthetic voice, as per the documentation of
            the service
          maxLength: 128
        external_id:
          type: string
          nullable: true
          description: Provider-specific voice identifier when it differs from the
            display name
          maxLength: 128
        neural:
          type: boolean
          default: false
          description: Indicates whether this voice is a neural voice
        language:
          type: string
          description: The language this voice is for
          maxLength: 64
        language_code:
          type: string
          description: The language code this voice is for
          maxLength: 32
        gender:
          description: |-
            The gender of this voice

            * `male` - Male
            * `female` - Female
            * `male (child)` - Male (Child)
            * `female (child)` - Female (Child)
          oneOf:
          - $ref: '#/components/schemas/VoiceGenderEnum'
          - $ref: '#/components/schemas/BlankEnum'
        service:
          allOf:
          - $ref: '#/components/schemas/ServiceEnum'
          description: |-
            The service this voice is from

            * `AWS` - AWS
            * `Azure` - Azure
            * `OpenAI` - OpenAI
            * `OpenAIVoiceEngine` - OpenAIVoiceEngine
            * `ElevenLabs` - ElevenLabs
            * `Intron` - Intron
        voice_provider:
          type: integer
          nullable: true
          title: Team
        file:
          type: integer
          nullable: true
      required:
      - created_at
      - external_id
      - gender
      - id
      - is_global
      - language
      - language_code
      - name
      - service
      - updated_at
      - voice_provider
    Team:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - name
      - slug
    TeamExportPage:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/TeamSync'
      required:
      - cursor
      - has_more
      - results
    TeamSync:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        feature_flags:
          type: array
          items:
            type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - created_at
      - feature_flags
      - id
      - name
      - slug
      - updated_at
    TraceProviderExportItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        config:
          type: string
          description: Sealed under the team's public key (base64, RSA-OAEP).
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        type:
          $ref: '#/components/schemas/TraceProviderExportItemTypeEnum'
        name:
          type: string
          maxLength: 255
      required:
      - config
      - created_at
      - id
      - name
      - type
      - updated_at
    TraceProviderExportItemTypeEnum:
      enum:
      - langfuse
      type: string
      description: '* `langfuse` - Langfuse'
    TraceProviderExportPage:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/TraceProviderExportItem'
      required:
      - cursor
      - has_more
      - results
    VoiceGenderEnum:
      enum:
      - male
      - female
      - male (child)
      - female (child)
      type: string
      description: |-
        * `male` - Male
        * `female` - Female
        * `male (child)` - Male (Child)
        * `female (child)` - Female (Child)
    VoiceProviderExportItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        config:
          type: string
          description: Sealed under the team's public key (base64, RSA-OAEP).
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        type:
          $ref: '#/components/schemas/VoiceProviderExportItemTypeEnum'
        name:
          type: string
          maxLength: 255
      required:
      - config
      - created_at
      - id
      - name
      - type
      - updated_at
    VoiceProviderExportItemTypeEnum:
      enum:
      - aws
      - azure
      - openai
      - openaivoiceengine
      - elevenlabs
      - intron
      type: string
      description: |-
        * `aws` - AWS Polly
        * `azure` - Azure Text to Speech
        * `openai` - OpenAI Text to Speech
        * `openaivoiceengine` - OpenAI Voice Engine Text to Speech
        * `elevenlabs` - ElevenLabs
        * `intron` - Intron
    VoiceProviderExportPage:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/VoiceProviderExportItem'
      required:
      - cursor
      - has_more
      - results
    VoiceResponseBehaviourEnum:
      enum:
      - always
      - reciprocal
      - never
      type: string
      description: |-
        * `always` - Always
        * `reciprocal` - Reciprocal
        * `never` - Never
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: /o/authorize/
          tokenUrl: /o/token/
          scopes:
            chatbots:read: List and Retrieve Chatbot Data
            chatbots:interact: Converse with a Chatbot and trigger bot messages
            sessions:read: List and Read Sessions
            sessions:write: Manage Sessions
            files:read: Download file content
            participants:read: Read Participant Data
            participants:write: Update Participant Data
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-api-key
    tokenAuth:
      type: http
      scheme: bearer
tags:
- name: Export
  description: Read team-scoped data one resource at a time for the team data sync/export.
- name: Chatbots
  description: List, retrieve and inspect chatbots (v2; formerly 'experiments').
- name: Me
  description: Information about the authenticated user and the team the token is
    scoped to.
externalDocs:
  url: https://docs.openchatstudio.com/api/
  description: API Guides
