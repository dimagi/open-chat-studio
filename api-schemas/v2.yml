openapi: 3.0.3
info:
  title: Open Chat Studio
  version: v2
  description: Build, deploy and monitor chatbots.
paths:
  /api/v2/chatbots/:
    get:
      operationId: chatbot_list
      summary: List Chatbots
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Chatbots
      security:
      - OAuth2:
        - chatbots:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatbotList'
          description: ''
  /api/v2/chatbots/{id}/:
    get:
      operationId: chatbot_retrieve
      summary: Retrieve Chatbot
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Chatbot ID
        required: true
      tags:
      - Chatbots
      security:
      - OAuth2:
        - chatbots:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chatbot'
          description: ''
  /api/v2/chatbots/{id}/inspect/:
    get:
      operationId: chatbot_inspect
      description: Return the chatbot's full configuration as a single read-only document.
      summary: Inspect Chatbot
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Chatbot ID
        required: true
      - in: query
        name: version
        schema:
          type: string
        description: 'Which version to inspect: a version number, ''default'' for
          the default published version, or omit for the working (draft) version.'
      tags:
      - Chatbots
      security:
      - OAuth2:
        - chatbots:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotInspect'
          description: ''
  /api/v2/manifest/:
    get:
      operationId: manifest
      description: 'Returns the resource manifest: resource call order, per-model
