components:
  schemas:
    ActionTypeEnum:
      enum:
      - log
      - end_conversation
      - send_message_to_bot
      - schedule_trigger
      - pipeline_start
      type: string
      description: |-
        * `log` - Log the last message
        * `end_conversation` - End the conversation
        * `send_message_to_bot` - Prompt the bot to message the user
        * `schedule_trigger` - Trigger a schedule
        * `pipeline_start` - Start a pipeline
    AnalysisQueryDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        prompt:
          type: string
        output_format:
          type: string
          maxLength: 255
        order:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        analysis:
          type: integer
      required:
      - analysis
      - id
      - prompt
    AnalysisQueryList:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/AnalysisQueryDetail'
      required:
      - cursor
      - has_more
      - results
    AnnotationDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_authoritative:
          type: boolean
        authoritative_set_at:
          type: string
          format: date-time
          nullable: true
        data:
          description: Annotation data matching the queue's schema
        status:
          $ref: '#/components/schemas/AnnotationDetailStatusEnum'
        item:
          type: integer
        reviewer:
          type: integer
        authoritative_set_by:
          type: integer
          nullable: true
      required:
      - created_at
      - id
      - item
      - reviewer
      - updated_at
    AnnotationDetailStatusEnum:
      enum:
      - draft
      - submitted
      type: string
      description: |-
        * `draft` - Draft
        * `submitted` - Submitted
    AnnotationItemDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        item_type:
          $ref: '#/components/schemas/ItemTypeEnum'
        status:
          $ref: '#/components/schemas/AnnotationItemDetailStatusEnum'
        review_count:
          type: integer
          maximum: 32767
          minimum: 0
        flags: {}
        queue:
          type: integer
        session:
          type: integer
          nullable: true
        message:
          type: integer
          nullable: true
      required:
      - created_at
      - id
      - item_type
      - message
      - queue
      - session
      - updated_at
    AnnotationItemDetailStatusEnum:
      enum:
      - pending
      - in_progress
      - awaiting_resolution
      - completed
      - flagged
      type: string
      description: |-
        * `pending` - Pending
        * `in_progress` - In Progress
        * `awaiting_resolution` - Awaiting resolution
        * `completed` - Completed
        * `flagged` - Flagged
    AnnotationItemList:
      type: object
      properties:
        cursor:
