components:
  schemas:
    AuthProviderDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        config:
          type: string
          description: Sealed under the team's public key (base64, RSA-OAEP).
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        type:
          $ref: '#/components/schemas/AuthProviderDetailTypeEnum'
        name:
          type: string
          maxLength: 255
      required:
      - config
      - created_at
      - id
      - name
      - type
      - updated_at
    AuthProviderDetailTypeEnum:
      enum:
      - basic
      - api_key
      - bearer
      - commcare
      type: string
      description: |-
        * `basic` - Basic
        * `api_key` - API Key
        * `bearer` - Bearer Auth
        * `commcare` - CommCare
    AuthProviderList:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/AuthProviderDetail'
      required:
      - cursor
      - has_more
      - results
    BlankEnum:
      enum:
      - ''
    ChatbotSessionStatusEnum:
      enum:
      - setup
      - pending
      - active
      - pending-review
      - complete
      - unknown
      type: string
      description: |-
        * `setup` - Setting Up
        * `pending` - Awaiting participant
        * `active` - Active
        * `pending-review` - Awaiting final review.
        * `complete` - Complete
        * `unknown` - Unknown
    ChatbotVersion:
      type: object
      description: |-
        A chatbot's published version, nested on the working-version row so the version family is
        visible without a follow-up query.
      properties:
        name:
          type: string
          maxLength: 128
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_default_version:
          type: boolean
        version_description:
          type: string
      required:
      - name
    ConsentFormDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 128
        consent_text:
          type: string
          description: Custom markdown text
        capture_identifier:
          type: boolean
        identifier_label:
          type: string
          maxLength: 200
        identifier_type:
          $ref: '#/components/schemas/IdentifierTypeEnum'
        is_default:
          type: boolean
          readOnly: true
        confirmation_text:
          type: string
          description: Use this text to tell the user to respond with '1' in order
            to give their consent
        is_archived:
          type: boolean
        working_version:
          type: integer
          nullable: true
      required:
      - consent_text
      - created_at
      - id
      - is_default
      - name
      - updated_at
    ConsentFormList:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/ConsentFormDetail'
      required:
      - cursor
      - has_more
      - results
    CustomUserDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        groups:
          type: array
          items:
            type: string
          readOnly: true
        last_login:
          type: string
          format: date-time
          nullable: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        avatar:
          type: string
          format: uri
        language:
          type: string
          nullable: true
          maxLength: 10
      required:
      - groups
      - id
      - username
    CustomUserList:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/CustomUserDetail'
      required:
      - cursor
      - has_more
      - results
    EmbeddingProviderModelDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        is_global:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        type:
          $ref: '#/components/schemas/TypeB81Enum'
        name:
          type: string
          description: The name of the model. e.g. 'text-embedding-3-small'
          maxLength: 128
      required:
      - created_at
      - id
      - is_global
      - name
      - type
      - updated_at
    EmbeddingProviderModelList:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/EmbeddingProviderModelDetail'
      required:
      - cursor
      - has_more
      - results
    ExperimentDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ChatbotVersion'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 128
        description:
          type: string
          nullable: true
          title: A longer description of the experiment.
        seed_message:
          type: string
          description: If set, send this message to the bot when the session starts,
            and prompt the user with the initial response.
        public_id:
          type: string
          format: uuid
        conversational_consent_enabled:
          type: boolean
          description: 'If enabled, the consent form will be sent at the start of
            a conversation for external channels. Note: This requires the experiment
            to have a seed message.'
        voice_response_behaviour:
          allOf:
          - $ref: '#/components/schemas/VoiceResponseBehaviourEnum'
          description: |-
            This tells the bot when to reply with voice messages

            * `always` - Always
            * `reciprocal` - Reciprocal
            * `never` - Never
        echo_transcript:
          type: boolean
          description: Whether or not the bot should tell the user what it heard when
            the user sends voice messages
        participant_allowlist:
          type: array
          items:
            type: string
            maxLength: 128
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
          default: 1
        is_default_version:
          type: boolean
          default: false
        is_archived:
          type: boolean
        version_description:
          type: string
        debug_mode_enabled:
          type: boolean
        create_version_task_id:
          type: string
          maxLength: 128
        file_uploads_enabled:
          type: boolean
          description: Enables file attachments in the web chat interface.
        owner:
          type: integer
        pipeline:
          type: integer
          nullable: true
        consent_form:
          type: integer
          nullable: true
          description: Consent form content to show to users before participation
            in experiments.
        voice_provider:
          type: integer
          nullable: true
        synthetic_voice:
          type: integer
          nullable: true
        trace_provider:
          type: integer
          nullable: true
        working_version:
          type: integer
          nullable: true
      required:
      - created_at
      - id
      - name
      - owner
      - updated_at
      - versions
      - working_version
    ExperimentList:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for the next page; null once the resource is exhausted.
        has_more:
          type: boolean
          description: True while more rows remain beyond this page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentDetail'
      required:
      - cursor
      - has_more
      - results
    ExperimentSessionDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        chat:
          allOf:
          - $ref: '#/components/schemas/SessionChat'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        external_id:
          type: string
          maxLength: 255
        session_token_required:
          type: boolean
          description: Require a signed session token (or authenticated user) for
            chat API access to this session.
        status:
          $ref: '#/components/schemas/ChatbotSessionStatusEnum'
        consent_date:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
          description: When the experiment (chat) ended.
        reviewed_at:
          type: string
          format: date-time
          nullable: true
          description: When the final review was submitted.
        seed_task_id:
          type: string
          description: System ID of the seed message task, if present.
          maxLength: 40
        state: {}
        platform:
          type: string
          nullable: true
          maxLength: 128
        experiment_versions:
          type: array
          items:
            type: integer
            maximum: 2147483647
            minimum: 0
          nullable: true
          description: Array of unique experiment version numbers seen by this session
        last_activity_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last user interaction
        first_activity_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the first user interaction
        participant:
          type: integer
        experiment:
          type: integer
        experiment_channel:
          type: integer
          nullable: true
      required:
      - chat
      - created_at
      - experiment
      - id
      - participant
      - updated_at
    ExperimentSessionList:
      type: object
      properties:
        cursor:
