          readOnly: true
          title: API URL
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentVersion'
      required:
      - id
      - name
      - url
      - versions
    ExperimentSession:
      type: object
      properties:
        url:
          type: string
          format: uri
          example: https://example.com/api/sessions/123e4567-e89b-12d3-a456-426614174000/
          readOnly: true
        id:
          type: string
          readOnly: true
        team:
          allOf:
          - $ref: '#/components/schemas/Team'
          readOnly: true
        experiment:
          allOf:
          - $ref: '#/components/schemas/ExperimentStub'
          readOnly: true
        participant:
          allOf:
          - $ref: '#/components/schemas/Participant'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        status:
          $ref: '#/components/schemas/ChatbotSessionStatusEnum'
        platform:
          type: string
          nullable: true
          maxLength: 128
        tags:
          type: array
          items:
            type: string
        state: {}
      required:
      - created_at
      - experiment
      - id
      - participant
      - tags
      - team
      - updated_at
      - url
    ExperimentSessionCreate:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        experiment:
          type: string
          format: uuid
          title: Experiment ID
        participant:
          type: string
          title: Participant identifier
          description: Channel specific participant identifier
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        state: {}
      required:
      - experiment
      - url
    ExperimentSessionWithMessages:
      type: object
      properties:
        url:
          type: string
          format: uri
          example: https://example.com/api/sessions/123e4567-e89b-12d3-a456-426614174000/
          readOnly: true
        id:
          type: string
          readOnly: true
        team:
          allOf:
          - $ref: '#/components/schemas/Team'
          readOnly: true
        experiment:
          allOf:
          - $ref: '#/components/schemas/ExperimentStub'
          readOnly: true
        participant:
          allOf:
          - $ref: '#/components/schemas/Participant'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        status:
          $ref: '#/components/schemas/ChatbotSessionStatusEnum'
        platform:
          type: string
          nullable: true
          maxLength: 128
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          readOnly: true
        usage:
          allOf:
          - $ref: '#/components/schemas/SessionUsage'
          readOnly: true
        tags:
          type: array
          items:
            type: string
        state: {}
