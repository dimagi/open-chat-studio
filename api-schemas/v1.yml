          $ref: '#/components/schemas/Message'
        status:
          $ref: '#/components/schemas/ChatTaskPollStatusEnum'
    ChatTaskPollError:
      type: object
      properties:
        error:
          type: string
        status:
          type: string
      required:
      - status
    ChatTaskPollNotFound:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ChatTaskPollStatusEnum:
      enum:
      - processing
      - complete
      type: string
      description: |-
        * `processing` - processing
        * `complete` - complete
    ChatTaskPollUserError:
      type: object
      properties:
        error:
          type: string
        status:
          type: string
      required:
      - status
    ChatUploadFileRequest:
      type: object
