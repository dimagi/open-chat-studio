components:
  schemas:
    ApiMessage:
      type: object
      properties:
        message:
          type: string
          title: User message
        session:
          type: string
          title: Optional session ID
      required:
      - message
    ApiResponseAttachment:
      type: object
      properties:
        file_name:
          type: string
        link:
          type: string
      required:
      - file_name
      - link
    ApiResponseMessage:
      type: object
      properties:
        response:
          type: string
          title: AI response
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ApiResponseAttachment'
          title: List of file URLs
      required:
      - attachments
      - response
    ApiSchemaDigest:
      type: object
      description: A custom action's OpenAPI schema reduced to just the paths of the
        selected operations.
      properties:
        paths:
          type: array
          items:
            type: string
      required:
      - paths
    Assistant:
      type: object
      description: Assistant fields. ``instructions`` and ``assistant_id`` are exposed
        on purpose.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        assistant_id:
          type: string
          maxLength: 255
        instructions:
          type: string
        builtin_tools:
          type: array
          items:
            type: string
            maxLength: 128
        tools:
          type: array
          items:
            type: string
            maxLength: 128
        temperature:
          type: number
          format: double
          maximum: 2.0
          minimum: 0.0
        top_p:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
      required:
      - assistant_id
      - id
      - instructions
      - name
    AssistantNodeParams:
      type: object
      properties:
        tag:
          type: string
          description: Tag applied to this node's output message; blank means no tag.
        citations_enabled:
          type: boolean
          description: Include cited sources in responses.
        input_formatter:
          type: string
          description: Optional wrapper for the user input; use ``{input}`` as the
            placeholder.
    BooleanNodeParams:
      type: object
      properties:
        input_equals:
          type: string
          description: Value the node input is compared against to pick the true/false
            branch.
        tag_output_message:
          type: boolean
          description: Tag the output message with the selected route.
    Channel:
      type: object
      description: |-
        A channel's ``platform``, ``name``, messaging provider and platform-specific identifier fields.

        ``extra_data`` holds free-form auth material and is excluded entirely. Each platform's non-secret
        identifying field(s) are surfaced as top-level keys, present only for the platform they belong to:
        ``number`` (WhatsApp), ``page_id`` (Facebook), ``sureadhere_tenant_id`` (SureAdhere),
        ``commcare_connect_bot_name`` (CommCare Connect), and ``allow_all_domains`` / ``allowed_domains``
        (Embedded Widget). Platforms whose identifier is itself a secret (Telegram's ``bot_token``, the
        widget's ``widget_token``) surface none.
      properties:
        platform:
          $ref: '#/components/schemas/PlatformEnum'
        name:
          type: string
          description: The name of this channel
          maxLength: 255
        messaging_provider:
          allOf:
          - $ref: '#/components/schemas/Provider'
          nullable: true
        number:
          type: string
          nullable: true
          readOnly: true
        page_id:
          type: string
          nullable: true
          readOnly: true
        sureadhere_tenant_id:
          type: string
          nullable: true
          readOnly: true
        commcare_connect_bot_name:
          type: string
          nullable: true
          readOnly: true
        allow_all_domains:
          type: boolean
          readOnly: true
        allowed_domains:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - messaging_provider
      - name
    ChatCompletionResponseChoices:
      type: object
      properties:
        finish_reason:
          type: string
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatCompletionResponseMessage'
      required:
      - finish_reason
      - index
      - message
    ChatCompletionResponseMessage:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/ChatCompletionResponseMessageRoleEnum'
        content:
          type: string
      required:
      - content
      - role
    ChatCompletionResponseMessageRoleEnum:
      enum:
      - assistant
      type: string
      description: '* `assistant` - assistant'
    ChatPollResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          title: New messages since last poll
        has_more:
          type: boolean
          title: Whether there are more messages to fetch
        session_status:
          allOf:
          - $ref: '#/components/schemas/SessionStatusEnum'
          title: Current session status
      required:
      - has_more
      - messages
      - session_status
    ChatSendMessageRequestWithAttachments:
      type: object
      properties:
        message:
          type: string
          title: Message content
        context:
          type: object
          additionalProperties: {}
          description: Additional context data to include with the message such as
            details about the page the user is on or the action they are trying to
            perform. This is stored in the session state under the `remote_context`
            key.
        attachment_ids:
          type: array
          items:
            type: integer
          description: List of file IDs from prior upload
        version_number:
          type: integer
          nullable: true
          description: Optional version number of the chatbot to use. Requires authentication.
      required:
      - message
    ChatSendMessageResponse:
      type: object
      properties:
        task_id:
          type: string
          description: The ID of the task that is processing the message
        status:
          allOf:
          - $ref: '#/components/schemas/ChatSendMessageResponseStatusEnum'
          title: Processing status
        error:
          type: string
          title: Error message
      required:
      - status
      - task_id
    ChatSendMessageResponseStatusEnum:
      enum:
      - processing
      - completed
      - error
      type: string
      description: |-
        * `processing` - Processing
        * `completed` - Completed
        * `error` - Error
    ChatStartSessionRequest:
      type: object
      properties:
        chatbot_id:
          type: string
          format: uuid
        version_number:
          type: integer
          nullable: true
          description: Optional version number of the chatbot to use. Requires authentication.
        session_data:
          type: object
          additionalProperties: {}
          title: Initial session data
          description: Optional initial state data for the session. This field will
            be ignored if the request is not authenticated.
        participant_remote_id:
          type: string
          default: ''
          description: Optional ID for the participant from remote systems
        participant_name:
          type: string
          title: Paricipant Name
          description: Optional participant name
        use_session_token:
          type: boolean
          nullable: true
          description: Whether to protect the session with a session token (default
            true). When enabled, the response includes a `session_token` which must
            be sent as the `X-Session-Token` header on all subsequent requests for
            this session. Set to false to opt out and rely on legacy access rules.
      required:
      - chatbot_id
    ChatStartSessionResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        session_token:
          type: string
          nullable: true
          description: Present when the session is token-protected. Send as the `X-Session-Token`
            header on all subsequent requests for this session.
        chatbot:
          allOf:
          - $ref: '#/components/schemas/Experiment'
          readOnly: true
        participant:
          allOf:
          - $ref: '#/components/schemas/Participant'
          readOnly: true
      required:
      - chatbot
      - participant
      - session_id
    ChatTaskPoll:
      type: object
      properties:
        message:
          $ref: '#/components/schemas/Message'
        status:
          $ref: '#/components/schemas/ChatTaskPollStatusEnum'
    ChatTaskPollError:
      type: object
      properties:
        error:
          type: string
        status:
          type: string
      required:
      - status
    ChatTaskPollNotFound:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ChatTaskPollStatusEnum:
      enum:
      - processing
      - complete
      type: string
      description: |-
        * `processing` - processing
        * `complete` - complete
    ChatTaskPollUserError:
      type: object
      properties:
        error:
          type: string
        status:
          type: string
      required:
      - status
    ChatUploadFileRequest:
      type: object
      properties:
        files:
          type: array
          items:
            type: string
            format: uri
          description: Files to upload (max 50MB each, 50MB total)
      required:
      - files
    ChatUploadFileResponse:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/UploadedFile'
      required:
      - files
    Chatbot:
      type: object
      description: |-
        Basic chatbot fields for the list and retrieve endpoints.

        The full configuration is served by the ``inspect`` action instead (ADR-0024). v2 calls these
        "chatbots" rather than "experiments" (ADR-0023).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        url:
          type: string
          format: uri
          readOnly: true
          title: API URL
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ChatbotVersion'
      required:
      - id
      - name
      - url
      - versions
    ChatbotInspect:
      type: object
      description: |-
        The whole chatbot configuration in one read-only response (ADR-0024).

        The chatbot's fields sit at the top level — there's no wrapper key around them. Expects the
        resolved :class:`~apps.experiments.models.Experiment`, and needs a ``fetcher`` in its context.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        description:
          type: string
          nullable: true
          title: A longer description of the experiment.
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_unreleased:
          type: boolean
          description: True for the working (draft) version that has not been released;
            never the published one.
        is_published_version:
          type: boolean
          description: True for the version currently served to participants (the
            live default).
        version_description:
          type: string
          description: Free-text label for this version (e.g. 'latest'); not an enum.
        team_slug:
          type: string
        settings:
          $ref: '#/components/schemas/InspectSettings'
        consent_form:
          allOf:
          - $ref: '#/components/schemas/ConsentForm'
          nullable: true
        voice:
          allOf:
          - $ref: '#/components/schemas/FlattenedVoice'
          nullable: true
          readOnly: true
        trace_provider:
          allOf:
          - $ref: '#/components/schemas/Provider'
          nullable: true
        channels:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
          readOnly: true
        pipeline:
          allOf:
          - $ref: '#/components/schemas/InspectPipeline'
          nullable: true
          readOnly: true
        events:
          $ref: '#/components/schemas/InspectEvents'
      required:
      - channels
      - consent_form
      - events
      - id
      - is_published_version
      - is_unreleased
      - name
      - pipeline
      - settings
      - team_slug
      - trace_provider
      - version_description
      - voice
    ChatbotVersion:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_default_version:
          type: boolean
        version_description:
          type: string
      required:
      - name
    CodeNodeParams:
      type: object
      properties:
        tag:
          type: string
          description: Tag applied to this node's output message; blank means no tag.
        code:
