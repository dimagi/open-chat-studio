      description: |-
        * `setup` - Setting Up
        * `pending` - Awaiting participant
        * `active` - Active
        * `pending-review` - Awaiting final review.
        * `complete` - Complete
        * `unknown` - Unknown
    CreateChatCompletionRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
      required:
      - messages
    CreateChatCompletionResponse:
      type: object
      properties:
