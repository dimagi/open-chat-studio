openapi: 3.0.3
info:
  title: Open Chat Studio
  version: '1'
  description: Build, deploy and monitor chatbots.
paths:
  /api/chat/{session_id}/{task_id}/poll/:
    get:
      operationId: chat_poll_task_response
      summary: Poll for task updates
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      - in: path
        name: task_id
        schema:
          type: string
        description: Check on the status of a specific task
        required: true
      tags:
      - Chat
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPoll'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPollUserError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPollNotFound'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPollError'
          description: ''
  /api/chat/{session_id}/message/:
    post:
      operationId: chat_send_message
      description: Send a message to a chat session
      summary: Send a message to a chat session
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      tags:
      - Chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendMessageRequestWithAttachments'
            examples:
              SendMessage:
                value:
                  message: Hello, how can you help me?
                summary: Send a message to the bot
              SendMessageWithAttachments:
                value:
                  message: Please review these documents
                  attachment_ids:
                  - 123
                  - 124
                summary: Send a message with file attachments
        required: true
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSendMessageResponse'
          description: ''
  /api/chat/{session_id}/poll/:
    get:
      operationId: chat_poll_response
      description: Poll for new messages in a chat session
      summary: Poll for new messages in a chat session. Do not poll more than once
        every 30 seconds
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Maximum number of messages to return (default: 50)'
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      - in: query
        name: since
        schema:
          type: string
          format: date-time
        description: Only return messages after this timestamp
      tags:
      - Chat
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatPollResponse'
          description: ''
  /api/chat/{session_id}/upload/:
    post:
      operationId: chat_upload_file
      summary: Upload files for a chat message
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      tags:
      - Chat
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatUploadFileRequest'
        required: true
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
