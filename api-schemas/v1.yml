      - messages
      - participant
      - tags
      - team
      - updated_at
      - url
      - usage
    ExperimentStub:
      type: object
      description: A lightweight experiment representation for embedding in other
        resources.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        description:
          type: string
          nullable: true
          title: A longer description of the experiment.
        url:
          type: string
          format: uri
          example: https://example.com/api/experiments/123e4567-e89b-12d3-a456-426614174000/
          readOnly: true
          title: API URL
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - id
      - name
      - url
    ExperimentVersion:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
