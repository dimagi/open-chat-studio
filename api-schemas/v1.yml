        schedules:
          type: array
          items:
            $ref: '#/components/schemas/ParticipantSchedule'
      required:
      - experiment
    ParticipantSchedule:
      type: object
      properties:
        id:
          type: string
          title: Schedule ID
          maxLength: 32
        name:
          type: string
          title: Schedule Name
        prompt:
          type: string
          title: Prompt to send to bot
        date:
          type: string
          format: date-time
          title: Schedule Date
        delete:
          type: boolean
          default: false
          title: Delete Schedule
    Patchedupdate_state_serializer:
      type: object
      properties:
        state: {}
    PlatformEnum:
      enum:
      - telegram
      - web
      - whatsapp
      - facebook
      - sureadhere
      - api
      - slack
      - commcare_connect
      - evaluations
      - embedded_widget
      - email
      type: string
      description: |-
        * `telegram` - Telegram
        * `web` - Web
        * `whatsapp` - WhatsApp
        * `facebook` - Facebook
        * `sureadhere` - SureAdhere
        * `api` - API
        * `slack` - Slack
        * `commcare_connect` - CommCare Connect
        * `evaluations` - Evaluations
        * `embedded_widget` - Embedded Widget
        * `email` - Email
    SessionModelUsage:
      type: object
      properties:
        model_name:
          type: string
        cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,8})?$
        tokens:
          type: integer
      required:
      - cost
      - model_name
      - tokens
    SessionStatusEnum:
      enum:
      - active
      - ended
      type: string
      description: |-
        * `active` - Active
        * `ended` - Ended
    SessionUsage:
      type: object
      properties:
        total_cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,8})?$
        by_model:
          type: array
          items:
            $ref: '#/components/schemas/SessionModelUsage'
      required:
      - by_model
      - total_cost
    Team:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - name
      - slug
    TriggerBotMessageRequest:
      type: object
      properties:
        identifier:
          type: string
          title: Participant Identifier
        platform:
          allOf:
          - $ref: '#/components/schemas/PlatformEnum'
          title: Participant Platform
        experiment:
          type: string
          format: uuid
          title: Experiment ID
        prompt_text:
          type: string
          nullable: true
          title: Prompt to go to bot
        message_text:
          type: string
          nullable: true
          title: Message to send directly to participant (bypasses bot/LLM)
        start_new_session:
          type: boolean
          default: false
          title: Starts a new session
        session_data:
          type: object
          additionalProperties: {}
          description: Update session data. This will be merged with existing session
            data
        participant_data:
          type: object
          additionalProperties: {}
          description: Update Participant data. This will be merged with existing
            participant data
      required:
      - experiment
      - identifier
      - platform
    TriggerBotMessageResponse:
      type: object
      properties:
        session_id:
          type: string
          readOnly: true
        url:
          type: string
          format: uri
          example: https://example.com/api/sessions/123e4567-e89b-12d3-a456-426614174000/
          readOnly: true
        team:
          allOf:
          - $ref: '#/components/schemas/Team'
          readOnly: true
        channel:
          type: string
          readOnly: true
      required:
      - channel
      - session_id
      - team
      - url
    UploadedFile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        size:
          type: integer
        content_type:
          type: string
      required:
      - content_type
      - id
      - name
      - size
    tags_request_serializer:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
      required:
      - tags
    tags_response_serializer:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
      required:
      - tags
    update_state_response:
      type: object
      properties:
        success:
          type: boolean
        state: {}
      required:
      - state
      - success
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: /o/authorize/
          tokenUrl: /o/token/
          scopes:
            chatbots:read: List and Retrieve Chatbot Data
            chatbots:interact: Converse with a Chatbot and trigger bot messages
            sessions:read: List and Read Sessions
            sessions:write: Manage Sessions
            files:read: Download file content
            participants:read: Read Participant Data
            participants:write: Update Participant Data
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-api-key
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    embedKeyAuth:
      type: apiKey
      in: header
      name: X-Embed-Key
      description: Embedded widget authentication token. Validates the widget token
        for the channel configuration and authenticates embedded widget requests.
    tokenAuth:
      type: http
      scheme: bearer
tags:
- name: Channels
  description: Trigger bot messages or deliver messages directly to users on a channel.
- name: Chat
  description: "\n                The Chat API is designed to be used for integrating
    chatbots into external systems.\n            "
- name: Experiments
  description: List and retrieve chatbots (formerly 'experiments').
- name: Experiment Sessions
  description: Manage chatbot sessions including session state, and session tags.
- name: Files
  description: Download the content of files associated with chat messages.
- name: OpenAI
  description: OpenAI-compatible endpoints for interacting with chatbots.
- name: Participants
  description: Manage participants, their data, and their schedules.
externalDocs:
  url: https://docs.openchatstudio.com/api/
  description: API Guides
