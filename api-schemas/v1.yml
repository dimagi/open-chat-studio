      - type
    RenderTemplateParams:
      type: object
      properties:
        tag:
          type: string
          description: Tag applied to this node's output message; blank means no tag.
        template_string:
          type: string
          description: Jinja2 template rendered against the node input.
    RouterNodeParams:
      type: object
      properties:
        llm_model_parameters:
          type: object
          additionalProperties: {}
          nullable: true
          description: Model call parameters (e.g. ``temperature``) keyed by name.
            Older nodes may instead carry a flat ``llm_temperature``; both feed the
            same underlying setting.
        history_type:
          type: string
          description: 'Where this node''s chat history is scoped: ``global`` (whole
            session), ``node`` (this node only), ``named`` (a shared, named history),
            or ``none``.'
        history_name:
          type: string
          nullable: true
          description: Identifier of the shared history when ``history_type`` is ``named``;
            otherwise null.
        history_mode:
          type: string
          description: 'How history is compressed once it exceeds the limit: ``summarize``,
            ``truncate_tokens``, or ``max_history_length``.'
        max_history_length:
          type: integer
          nullable: true
          description: Keep only the most recent messages up to this count.
        user_max_token_limit:
          type: integer
          nullable: true
          description: Token budget before history is summarized or truncated. Distinct
            from the LLM model's own context window (reported under the node's ``llm``
            object).
        keywords:
          type: array
          items:
            type: string
          description: Router branch labels, one per output handle (``output_0`` maps
            to ``keywords[0]``, etc.). Only meaningful on router nodes; a stray empty
            value on other node types is legacy data.
        default_keyword_index:
          type: integer
          description: Index into ``keywords`` used when no branch matches.
        tag_output_message:
          type: boolean
          description: Tag the output message with the selected route.
        prompt:
          type: string
          description: Prompt steering the LLM router's choice.
    SendEmailParams:
      type: object
      properties:
        tag:
          type: string
          description: Tag applied to this node's output message; blank means no tag.
        recipient_list:
          type: string
          description: Comma-separated email addresses. Supports Jinja2 templates.
        subject:
          type: string
          description: Email subject. Supports Jinja2 templates.
        body:
          type: string
          description: Jinja2 body template; the pipeline input is used when blank.
    SessionStatusEnum:
      enum:
      - active
      - ended
      type: string
      description: |-
        * `active` - Active
        * `ended` - Ended
    SourceMaterial:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        topic:
          type: string
          maxLength: 50
        description:
          type: string
          nullable: true
          title: A longer description of the source material.
        material:
          type: string
      required:
      - id
      - material
      - topic
    StaticRouterNodeParams:
      type: object
      properties:
        keywords:
          type: array
          items:
            type: string
          description: Router branch labels, one per output handle (``output_0`` maps
            to ``keywords[0]``, etc.). Only meaningful on router nodes; a stray empty
            value on other node types is legacy data.
        default_keyword_index:
          type: integer
          description: Index into ``keywords`` used when no branch matches.
        tag_output_message:
          type: boolean
          description: Tag the output message with the selected route.
        data_source:
          type: string
          description: Where the routing value is read from (e.g. ``participant_data``).
        route_key:
          type: string
          nullable: true
          description: Key within the data source whose value selects the route.
    StatusCb5Enum:
      enum:
      - setup
      - pending
      - pending-pre-survey
      - active
      - pending-review
      - complete
      - unknown
      type: string
      description: |-
        * `setup` - Setting Up
        * `pending` - Awaiting participant
        * `pending-pre-survey` - Awaiting pre-survey
        * `active` - Active
        * `pending-review` - Awaiting final review.
        * `complete` - Complete
        * `unknown` - Unknown
    Team:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - name
      - slug
    TriggerBotMessageRequest:
      type: object
      properties:
        identifier:
          type: string
          title: Participant Identifier
        platform:
          allOf:
          - $ref: '#/components/schemas/PlatformEnum'
          title: Participant Platform
        experiment:
          type: string
          format: uuid
          title: Experiment ID
        prompt_text:
          type: string
          nullable: true
          title: Prompt to go to bot
        message_text:
          type: string
          nullable: true
          title: Message to send directly to participant (bypasses bot/LLM)
        start_new_session:
          type: boolean
          default: false
          title: Starts a new session
        session_data:
          type: object
          additionalProperties: {}
          description: Update session data. This will be merged with existing session
            data
        participant_data:
          type: object
          additionalProperties: {}
          description: Update Participant data. This will be merged with existing
            participant data
      required:
      - experiment
      - identifier
      - platform
    TriggerBotMessageResponse:
      type: object
      properties:
        session_id:
          type: string
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        team:
          allOf:
          - $ref: '#/components/schemas/Team'
          readOnly: true
        channel:
          type: string
          readOnly: true
      required:
      - channel
      - session_id
      - team
      - url
    UploadedFile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        size:
          type: integer
        content_type:
          type: string
      required:
      - content_type
      - id
      - name
      - size
    tags_request_serializer:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
      required:
      - tags
    tags_response_serializer:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
      required:
      - tags
    update_state_response:
      type: object
      properties:
        success:
          type: boolean
        state: {}
      required:
      - state
      - success
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: /o/authorize/
          tokenUrl: /o/token/
          scopes:
            chatbots:read: List and Retrieve Chatbot Data
            chatbots:interact: Converse with a Chatbot and trigger bot messages
            sessions:read: List and Read Sessions
            sessions:write: Manage Sessions
            files:read: Download file content
            participants:read: Read Participant Data
            participants:write: Update Participant Data
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-api-key
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    embedKeyAuth:
      type: apiKey
      in: header
      name: X-Embed-Key
      description: Embedded widget authentication token. Validates the widget token
        for the channel configuration and authenticates embedded widget requests.
    tokenAuth:
      type: http
      scheme: bearer
tags:
- name: Channels
  description: Trigger bot messages or deliver messages directly to users on a channel.
- name: Chat
  description: "\n                The Chat API is designed to be used for integrating
    chatbots into external systems.\n            "
- name: Experiments
  description: List and retrieve chatbots (formerly 'experiments').
- name: Experiment Sessions
  description: Manage chatbot sessions including session state, and session tags.
- name: Files
  description: Download the content of files associated with chat messages.
- name: OpenAI
  description: OpenAI-compatible endpoints for interacting with chatbots.
- name: Participants
  description: Manage participants, their data, and their schedules.
