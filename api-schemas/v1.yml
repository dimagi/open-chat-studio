        model:
          type: string
          nullable: true
        max_token_limit:
          type: integer
          nullable: true
          description: The model's maximum context window, in tokens.
        deprecated:
          type: boolean
          nullable: true
          description: True if this model is deprecated and should be migrated off.
      required:
      - type
    FlattenedModelProvider:
      type: object
      description: |-
        A collection's embedding provider and model, flattened into one object.

        Expects a :class:`ProviderModelPair`; a missing provider or model renders its fields as null.
      properties:
        provider_id:
          type: integer
          nullable: true
        provider_name:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
      required:
      - type
    FlattenedVoice:
      type: object
      description: |-
        A voice provider and synthetic voice, flattened into one ``voice`` object (ADR-0025).

        Expects a :class:`VoicePair`.
      properties:
        provider_id:
          type: integer
          nullable: true
        provider_name:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
          description: Voice provider type; null for a voice with no provider configured.
        voice_name:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
          description: Voice language/locale code; empty when the voice has no explicit
            language set.
        neural:
          type: boolean
          nullable: true
          description: Use the provider's neural (higher-quality) voice engine, where
            supported.
    IdentifierTypeEnum:
      enum:
      - email
      - text
      type: string
      description: |-
        * `email` - Email
        * `text` - Text
    IndexedCollection:
      type: object
      description: 'An indexed (RAG) collection: its identity, embedding provider/model,
        and files (ADR-0025).'
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        embedding:
          allOf:
          - $ref: '#/components/schemas/FlattenedModelProvider'
          nullable: true
          readOnly: true
        files:
          type: array
          items:
            $ref: '#/components/schemas/InspectFile'
      required:
      - embedding
      - files
      - id
      - name
    InspectEvents:
      type: object
      description: |-
        A chatbot's static and timeout triggers, excluding archived ones.

        ``static_triggers`` fire on conversation events (start, end, a new message, …); ``timeout_triggers``
        fire after a period of inactivity. The two overlap at the end of a conversation: a ``last_timeout``
        static trigger fires once the final timeout has elapsed.
      properties:
        static_triggers:
          type: array
          items:
            $ref: '#/components/schemas/InspectStaticTrigger'
          readOnly: true
        timeout_triggers:
          type: array
          items:
            $ref: '#/components/schemas/InspectTimeoutTrigger'
          readOnly: true
      required:
      - static_triggers
      - timeout_triggers
    InspectFile:
      type: object
      description: |-
        A file's identifying fields only.

        Leaves out the signed storage URL (a secret), plus ``summary`` and ``metadata`` (omitted to
        keep the response small, not for secrecy).
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        content_type:
          type: string
        content_size:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        external_source:
          type: string
          maxLength: 255
        external_id:
          type: string
          maxLength: 255
      required:
      - id
      - name
    InspectGraph:
      type: object
      description: |-
        The pipeline's shape: its nodes and the edges between them (without canvas positions).

        This is the topology only — each node carries just ``node_id``/``type``/``label`` for drawing the
        DAG. The sibling ``nodes`` list on the pipeline holds the same nodes in render order with their
        full configuration.
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/InspectGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/InspectGraphEdge'
      required:
      - edges
      - nodes
    InspectGraphEdge:
      type: object
      properties:
        source:
          type: string
          description: '``node_id`` the edge leaves from.'
        target:
          type: string
          description: '``node_id`` the edge points to.'
        source_handle:
          type: string
          nullable: true
          description: Output handle on the source node. Routers expose one handle
            per branch (``output_0``, ``output_1``, …), each mapping by index to the
            router's ``keywords``; most nodes have a single ``output``.
        target_handle:
          type: string
          nullable: true
          description: Input handle on the target node; currently always null (nodes
            have one implicit input).
      required:
      - source
      - source_handle
      - target
      - target_handle
    InspectGraphNode:
      type: object
      properties:
        node_id:
          type: string
        type:
          type: string
        label:
          type: string
      required:
      - label
      - node_id
      - type
    InspectNode:
      type: object
      description: |-
        One pipeline node, with the resources it references inlined.

        All resource keys are declared as fields so they appear in the OpenAPI schema, but a node only
        renders the keys its type actually uses: a ``StartNode`` shows none, while an
        ``LLMResponseWithPrompt`` shows its own — ``null`` for an unset single value, ``[]`` for an
        unset list. Keys the node type doesn't declare are dropped entirely.
      properties:
        node_id:
          type: string
        type:
          type: string
        label:
          type: string
        params:
          allOf:
          - $ref: '#/components/schemas/InspectNodeParams'
          readOnly: true
          description: The node's non-resource configuration, verbatim; keys vary
            by node type.
        llm:
          allOf:
          - $ref: '#/components/schemas/FlattenedLlm'
          nullable: true
          readOnly: true
        voice:
          allOf:
          - $ref: '#/components/schemas/FlattenedVoice'
          nullable: true
          readOnly: true
        source_material:
          allOf:
          - $ref: '#/components/schemas/SourceMaterial'
          nullable: true
          readOnly: true
        assistant:
          allOf:
          - $ref: '#/components/schemas/Assistant'
          nullable: true
          readOnly: true
        custom_actions:
          type: array
          items:
            $ref: '#/components/schemas/CustomAction'
          readOnly: true
        media_collection:
          allOf:
          - $ref: '#/components/schemas/MediaCollection'
          nullable: true
          readOnly: true
        indexed_collections:
          type: array
          items:
            $ref: '#/components/schemas/IndexedCollection'
          readOnly: true
      required:
      - label
      - node_id
      - params
      - type
    InspectNodeParams:
      oneOf:
      - $ref: '#/components/schemas/RenderTemplateParams'
      - $ref: '#/components/schemas/CodeNodeParams'
      - $ref: '#/components/schemas/LLMResponseParams'
      - $ref: '#/components/schemas/LLMResponseWithPromptParams'
      - $ref: '#/components/schemas/RouterNodeParams'
      - $ref: '#/components/schemas/StaticRouterNodeParams'
      - $ref: '#/components/schemas/BooleanNodeParams'
      - $ref: '#/components/schemas/SendEmailParams'
      - $ref: '#/components/schemas/AssistantNodeParams'
      - $ref: '#/components/schemas/ExtractStructuredDataParams'
      - $ref: '#/components/schemas/ExtractParticipantDataParams'
    InspectPipeline:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 128
        version_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        graph:
          allOf:
          - $ref: '#/components/schemas/InspectGraph'
          readOnly: true
          description: The pipeline topology (nodes as id/type/label, plus edges)
            for drawing the DAG.
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/InspectNode'
          readOnly: true
          description: The same nodes as ``graph``, in render order, each with its
            full configuration.
      required:
      - graph
      - id
      - name
      - nodes
    InspectSettings:
      type: object
      description: The chatbot's non-secret settings, read directly off the experiment.
      properties:
        seed_message:
          type: string
          description: Message used to start the conversation before the participant
            says anything.
        conversational_consent_enabled:
          type: boolean
        voice_response_behaviour:
          type: string
          description: 'When the bot replies with voice: ``always``, ``reciprocal``
            (voice only when the participant sent voice), or ``never``.'
        echo_transcript:
          type: boolean
          description: When the participant sends a voice message, also reply with
            the text the bot transcribed.
        debug_mode_enabled:
          type: boolean
        file_uploads_enabled:
          type: boolean
        participant_allowlist:
          type: array
          items:
            type: string
          description: Identifiers permitted to chat; empty means no allowlist restriction.
      required:
      - conversational_consent_enabled
      - debug_mode_enabled
      - echo_transcript
      - file_uploads_enabled
      - participant_allowlist
      - seed_message
      - voice_response_behaviour
    InspectStaticTrigger:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/InspectStaticTriggerTypeEnum'
          description: |-
            The conversation event that fires this trigger

            * `conversation_end` - The conversation has ended (by any means)
            * `conversation_ended_by_user` - The conversation is ended by the participant
            * `conversation_ended_by_bot` - The conversation is ended by the bot
            * `conversation_ended_via_api` - The conversation is ended via the API
            * `conversation_ended_by_event` - The conversation is ended by an event
            * `conversation_ended_manually` - The conversation is manually ended by an admin
            * `last_timeout` - The last timeout occurs
            * `conversation_start` - A new conversation is started
            * `new_human_message` - A new human message is received
            * `new_bot_message` - A new bot message is received
            * `participant_joined` - A new participant joined the experiment
        is_active:
          type: boolean
        action:
          $ref: '#/components/schemas/InspectTriggerAction'
      required:
      - action
      - id
      - type
    InspectStaticTriggerTypeEnum:
      enum:
      - conversation_end
      - conversation_ended_by_user
      - conversation_ended_by_bot
      - conversation_ended_via_api
      - conversation_ended_by_event
      - conversation_ended_manually
      - last_timeout
      - conversation_start
      - new_human_message
      - new_bot_message
      - participant_joined
      type: string
      description: |-
        * `conversation_end` - The conversation has ended (by any means)
        * `conversation_ended_by_user` - The conversation is ended by the participant
        * `conversation_ended_by_bot` - The conversation is ended by the bot
        * `conversation_ended_via_api` - The conversation is ended via the API
        * `conversation_ended_by_event` - The conversation is ended by an event
        * `conversation_ended_manually` - The conversation is manually ended by an admin
        * `last_timeout` - The last timeout occurs
        * `conversation_start` - A new conversation is started
        * `new_human_message` - A new human message is received
        * `new_bot_message` - A new bot message is received
        * `participant_joined` - A new participant joined the experiment
    InspectTimeoutTrigger:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        delay_seconds:
          type: integer
          description: Seconds of inactivity before the trigger fires.
        total_num_triggers:
          type: integer
          description: Maximum number of times this timeout fires within a session.
        trigger_from_first_message:
          type: boolean
          description: Measure the delay from the first message (true) rather than
            the most recent message (false).
        is_active:
          type: boolean
        action:
          $ref: '#/components/schemas/InspectTriggerAction'
      required:
      - action
      - delay_seconds
      - id
      - total_num_triggers
      - trigger_from_first_message
    InspectTriggerAction:
      type: object
      description: |-
        The action an event trigger runs.

        The ``pipeline`` key only appears for ``pipeline_start`` actions whose pipeline could be found in
        the team. It's read from the pipelines the fetcher already loaded, so it costs no extra query.
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/InspectTriggerActionTypeEnum'
          description: |-
            What the trigger runs

            * `log` - Log the last message
            * `end_conversation` - End the conversation
            * `send_message_to_bot` - Prompt the bot to message the user
            * `schedule_trigger` - Trigger a schedule
            * `pipeline_start` - Start a pipeline
        params:
          type: object
          additionalProperties: {}
          readOnly: true
          description: Action parameters; keys depend on the action ``type``.
        pipeline:
          allOf:
          - $ref: '#/components/schemas/InspectPipeline'
          readOnly: true
      required:
      - params
      - type
    InspectTriggerActionTypeEnum:
      enum:
      - log
      - end_conversation
      - send_message_to_bot
      - schedule_trigger
      - pipeline_start
      type: string
      description: |-
        * `log` - Log the last message
        * `end_conversation` - End the conversation
        * `send_message_to_bot` - Prompt the bot to message the user
        * `schedule_trigger` - Trigger a schedule
        * `pipeline_start` - Start a pipeline
    LLMResponseParams:
      type: object
      description: An LLM call with no prompt/history configuration of its own.
      properties:
        llm_model_parameters:
          type: object
          additionalProperties: {}
          nullable: true
          description: Model call parameters (e.g. ``temperature``) keyed by name.
            Older nodes may instead carry a flat ``llm_temperature``; both feed the
            same underlying setting.
    LLMResponseWithPromptParams:
      type: object
      properties:
        tag:
          type: string
          description: Tag applied to this node's output message; blank means no tag.
        llm_model_parameters:
          type: object
          additionalProperties: {}
          nullable: true
          description: Model call parameters (e.g. ``temperature``) keyed by name.
            Older nodes may instead carry a flat ``llm_temperature``; both feed the
            same underlying setting.
        history_type:
          type: string
          description: 'Where this node''s chat history is scoped: ``global`` (whole
            session), ``node`` (this node only), ``named`` (a shared, named history),
            or ``none``.'
        history_name:
          type: string
          nullable: true
          description: Identifier of the shared history when ``history_type`` is ``named``;
            otherwise null.
        history_mode:
          type: string
          description: 'How history is compressed once it exceeds the limit: ``summarize``,
            ``truncate_tokens``, or ``max_history_length``.'
        max_history_length:
          type: integer
          nullable: true
          description: Keep only the most recent messages up to this count.
        user_max_token_limit:
          type: integer
          nullable: true
          description: Token budget before history is summarized or truncated. Distinct
            from the LLM model's own context window (reported under the node's ``llm``
            object).
        prompt:
          type: string
          description: System prompt for the LLM call.
        generate_citations:
          type: boolean
          description: Reference indexed-collection files in responses and let users
            download them.
        max_indexed_collection_search_results:
          type: integer
          description: Maximum number of results retrieved from an indexed collection
            search.
        tools:
          type: array
          items:
            type: string
          nullable: true
          description: Names of OCS tools enabled for the node (e.g. ``update-user-data``).
        built_in_tools:
          type: array
          items:
            type: string
          nullable: true
          description: Provider-native tools enabled for the model (e.g. ``web-search``).
        tool_config:
          type: object
          additionalProperties: {}
          nullable: true
          description: Per-tool configuration for the built-in tools.
        mcp_tools:
          type: array
          items:
            type: string
          nullable: true
          description: MCP server tools enabled for the node.
    Me:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        team:
          type: string
          readOnly: true
      required:
      - id
      - team
      - username
    MediaCollection:
      type: object
      description: 'A media collection: its identity and files, with no embedding
        details (ADR-0025).'
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        files:
          type: array
          items:
            $ref: '#/components/schemas/InspectFile'
      required:
      - files
      - id
      - name
    Message:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          readOnly: true
        role:
          $ref: '#/components/schemas/MessageRoleEnum'
        content:
          type: string
        metadata:
          readOnly: true
          description: |2

            Metadata for the message. Currently documented keys:
              * `compression_marker`: Slug that marks this message as a checkpoint for session history compression
        tags:
          type: array
          items:
            type: string
          readOnly: true
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/File'
          readOnly: true
      required:
      - attachments
      - content
      - created_at
      - metadata
      - role
      - tags
    MessageRoleEnum:
      enum:
      - system
      - user
      - assistant
      type: string
      description: |-
        * `system` - system
        * `user` - user
        * `assistant` - assistant
    ObjectEnum:
      enum:
      - chat.completion
