openapi: 3.0.3
info:
  title: Open Chat Studio
  version: v1
  description: Build, deploy and monitor chatbots.
paths:
  /api/chat/{session_id}/{task_id}/poll/:
    get:
      operationId: chat_poll_task_response
      summary: Poll for task updates
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      - in: path
        name: task_id
        schema:
          type: string
        description: Check on the status of a specific task
        required: true
      tags:
      - Chat
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPoll'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPollUserError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPollNotFound'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTaskPollError'
          description: ''
  /api/chat/{session_id}/message/:
    post:
      operationId: chat_send_message
      description: Send a message to a chat session
      summary: Send a message to a chat session
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      tags:
      - Chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendMessageRequestWithAttachments'
            examples:
              SendMessage:
                value:
                  message: Hello, how can you help me?
                summary: Send a message to the bot
              SendMessageWithAttachments:
                value:
                  message: Please review these documents
                  attachment_ids:
                  - 123
                  - 124
                summary: Send a message with file attachments
        required: true
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSendMessageResponse'
          description: ''
  /api/chat/{session_id}/poll/:
    get:
      operationId: chat_poll_response
      description: Poll for new messages in a chat session
      summary: Poll for new messages in a chat session. Do not poll more than once
        every 30 seconds
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Maximum number of messages to return (default: 50)'
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      - in: query
        name: since
        schema:
          type: string
          format: date-time
        description: Only return messages after this timestamp
      tags:
      - Chat
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatPollResponse'
          description: ''
  /api/chat/{session_id}/upload/:
    post:
      operationId: chat_upload_file
      summary: Upload files for a chat message
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
        description: Session ID
        required: true
      tags:
      - Chat
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatUploadFileRequest'
        required: true
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatUploadFileResponse'
          description: ''
  /api/chat/start/:
    post:
      operationId: chat_start_session
      description: Start a new chat session - supports both authenticated users and
        embedded widgets
      summary: Start a new chat session for a widget
      tags:
      - Chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatStartSessionRequest'
            examples:
              StartSessionPublishedVersion:
                value:
                  chatbot_id: 123e4567-e89b-12d3-a456-426614174000
                  session_data:
                    source: widget
                    page_url: https://example.com
                  participant_remote_id: abc
                  participant_name: participant_name
                summary: Start session with published version
              StartSessionSpecificVersion:
                value:
                  chatbot_id: 123e4567-e89b-12d3-a456-426614174000
                  version_number: 2
                  participant_remote_id: abc
                  participant_name: participant_name
                summary: Start session with specific version (requires auth)
        required: true
      security:
      - cookieAuth: []
      - embedKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatStartSessionResponse'
              examples:
                StartSessionPublishedVersionResponse:
                  value:
                    session_id: 123e4567-e89b-12d3-a456-426614174000
                    chatbot:
                      id: 123e4567-e89b-12d3-a456-426614174000
                      name: Example Bot
                      version_number: 0
                      versions: []
                      url: https://example.com/api/experiments/123e4567-e89b-12d3-a456-426614174000/
                    participant:
                      identifier: abc
                      remote_id: abc
                  summary: Session started with published version
                StartSessionSpecificVersionResponse:
                  value:
                    session_id: 123e4567-e89b-12d3-a456-426614174000
                    chatbot:
                      id: 123e4567-e89b-12d3-a456-426614174000
                      name: Example Bot
                      version_number: 2
                      versions: []
                      url: https://example.com/api/experiments/123e4567-e89b-12d3-a456-426614174000/
                    participant:
                      identifier: abc
                      remote_id: abc
                  summary: Session started with specific version
          description: ''
  /api/experiments/:
    get:
      operationId: experiment_list
      summary: List Chatbots
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Experiments
      security:
      - OAuth2:
        - chatbots:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedExperimentList'
          description: ''
  /api/experiments/{id}/:
    get:
      operationId: experiment_retrieve
      summary: Retrieve Chatbot
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: Experiment ID
        required: true
      tags:
      - Experiments
      security:
      - OAuth2:
        - chatbots:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
          description: ''
  /api/files/{id}/content:
    get:
      operationId: file_content
      summary: Download File Content
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Files
      security:
      - OAuth2:
        - files:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          description: ''
  /api/openai/{experiment_id}/chat/completions:
    post:
      operationId: openai_chat_completions
      description: |2

        Use OpenAI's client to send messages to the experiment and get responses. This will
        create a new session in the experiment with all the provided messages
        and return the response from the experiment.

        The last message must be a 'user' message.

        Example (Python):

        ```python
        experiment_id = "your experiment ID"

        client = OpenAI(
            api_key="your API key",
            base_url=f"https://www.openchatstudio.com/api/openai/{experiment_id}",
        )

        completion = client.chat.completions.create(
            model="anything",
            messages=[
                {"role": "assistant", "content": "How can I help you today?"},
                {"role": "user", "content": "I need help with something."},
            ],
        )

        reply = completion.choices[0].message
        ```
      summary: Chat Completions API for Experiments
      parameters:
      - in: path
        name: experiment_id
        schema:
          type: string
        description: Experiment ID
        required: true
      tags:
      - OpenAI
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
        required: true
      security:
      - OAuth2:
        - chatbots:interact
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionResponse'
          description: ''
  /api/openai/{experiment_id}/v{version}/chat/completions:
    post:
      operationId: openai_chat_completions_versioned
      description: |2

        Use OpenAI's client to send messages to the experiment and get responses. This will
        create a new session in the experiment with all the provided messages
        and return the response from the experiment.

        The last message must be a 'user' message.

        Example (Python):

        ```python
        experiment_id = "your experiment ID"

        client = OpenAI(
            api_key="your API key",
            base_url=f"https://www.openchatstudio.com/api/openai/{experiment_id}/v{version}",
        )

        completion = client.chat.completions.create(
            model="anything",
            messages=[
                {"role": "assistant", "content": "How can I help you today?"},
                {"role": "user", "content": "I need help with something."},
            ],
        )

        reply = completion.choices[0].message
        ```
      summary: Versioned Chat Completions API for Experiments
      parameters:
      - in: path
        name: experiment_id
        schema:
          type: string
        description: Experiment ID
        required: true
      - in: path
        name: version
        schema:
          type: integer
        required: true
      - in: query
        name: version
        schema:
          type: string
        description: Version of experiment
      tags:
      - OpenAI
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
        required: true
      security:
      - OAuth2:
        - chatbots:interact
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionResponse'
          description: ''
  /api/participants:
    get:
      operationId: list_participants
      description: 'GET: list participants for the team. POST: update/create participant
        data.'
      summary: List Participants
      parameters:
      - in: query
        name: chatbot
        schema:
          type: string
          format: uuid
        description: Filter by chatbot public id; returns participants that have data
          for the chatbot.
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: identifier
        schema:
          type: string
        description: Filter by participant identifier
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: platform
        schema:
          type: string
        description: Filter by platform (e.g. api, telegram, whatsapp)
      tags:
      - Participants
      security:
      - OAuth2:
        - participants:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedParticipantDetailList'
              examples:
                ListParticipants:
                  value:
                    next: https://example.com/api/?cursor=cD00ODY%3D
                    previous: https://example.com/api/?cursor=cj0xJnA9NDg3
                    results:
                    - id: e172ff63-2469-419f-a828-783fc9291bc7
                      identifier: part1
                      name: John
                      platform: api
                      remote_id: ''
                      data:
                      - chatbot: Support Bot
                        chatbot_id: 815e7ef4-3479-4689-ae6c-29ca1a04ca8e
                        data:
                          name: John
                          timezone: Africa/Johannesburg
                        connect_channel_id: null
                    count: 123
                  summary: A participant with their chatbot data
          description: ''
    post:
      operationId: update_participant_data
      description: 'GET: list participants for the team. POST: update/create participant
        data.'
      summary: Update Participant Data
      tags:
      - Participants
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantDataUpdateRequest'
            examples:
              CreateParticipantData:
                value:
                  identifier: part1
                  platform: api
                  data:
                  - experiment: exp1
                    data:
                      name: John
                  - experiment: exp2
                    data:
                      name: Doe
                    schedules:
                    - id: sched1
                      name: Schedule 1
                      date: '2022-01-01T00:00:00Z'
                      prompt: Prompt 1
                summary: Create participant data for multiple experiments
              UpdateParticipantSchedules:
                value:
                  identifier: part1
                  platform: api
                  data:
                  - experiment: exp1
                    schedules:
                    - id: sched1
                      name: Schedule 1 updated
                      date: '2022-01-01T00:00:00Z'
                      prompt: Prompt updated
                    - id: sched2
                      delete: true
                summary: Update and delete participant schedules
        required: true
      security:
      - OAuth2:
        - participants:write
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantDetail'
              examples:
                UpdateParticipantDataResponse:
                  value:
                    id: e172ff63-2469-419f-a828-783fc9291bc7
                    identifier: part1
                    name: John
                    platform: commcare_connect
                    remote_id: ''
                    data:
                    - chatbot: Support Bot
                      chatbot_id: 815e7ef4-3479-4689-ae6c-29ca1a04ca8e
                      data:
                        name: John
                      connect_channel_id: c64a1f7d-2f9b-4c3a-9e57-0f0c9a3a1b2d
                  summary: Response including connect channel IDs
          description: ''
  /api/sessions/:
    get:
      operationId: session_list
      summary: List Chatbot Sessions
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: experiment
        schema:
          type: string
        description: Experiment ID to filter sessions by
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -created_at
          - created_at
        description: 'Which field to use when ordering the results. Available fields:
          `created_at`. Prefix a field with `-` for descending order (e.g. `-created_at`),
          or omit the prefix for ascending order (e.g. `created_at`). Defaults to
          `-created_at`.'
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: tags
        schema:
          type: string
        description: A list of session tags (comma separated) to filter the results
          by
      - in: query
        name: versions
        schema:
          type: string
        description: Experiment versions (comma separated) to filter sessions by
      tags:
      - Experiment Sessions
      security:
      - OAuth2:
        - sessions:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedExperimentSessionList'
          description: ''
    post:
      operationId: session_create
      summary: Create Chatbot Session
      tags:
      - Experiment Sessions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExperimentSessionCreate'
        required: true
      security:
      - OAuth2:
        - sessions:write
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentSession'
          description: ''
  /api/sessions/{id}/:
    get:
      operationId: session_retrieve
      description: |2

        Retrieve the details of an session. This includes the messages exchanged during the session ordered
        by the creation date.
      summary: Retrieve Chatbot Session
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: ID of the session
        required: true
      tags:
      - Experiment Sessions
      security:
      - OAuth2:
        - sessions:read
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentSessionWithMessages'
          description: ''
  /api/sessions/{id}/end_experiment_session/:
    post:
      operationId: session_end
      summary: End Chatbot Session
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: ID of the session
        required: true
      tags:
      - Experiment Sessions
      security:
      - OAuth2:
        - sessions:write
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/sessions/{id}/tags/:
    post:
      operationId: session_add_tags
      description: Add tags to a session. Tags are automatically created if they don't
        exist.
      summary: Add Tags to Session
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: ID of the session
        required: true
      tags:
      - Experiment Sessions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tags_request_serializer'
        required: true
      security:
      - OAuth2:
        - sessions:write
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tags_response_serializer'
          description: ''
    delete:
      operationId: session_remove_tags
      description: Remove tags from a session.
      summary: Remove Tags from Session
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: ID of the session
        required: true
      tags:
      - Experiment Sessions
      security:
      - OAuth2:
        - sessions:write
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tags_response_serializer'
          description: ''
  /api/sessions/{id}/update_state/:
    patch:
      operationId: session_update_state
      summary: Update Chatbot Session State
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: ID of the session
        required: true
      tags:
      - Experiment Sessions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Patchedupdate_state_serializer'
      security:
      - OAuth2:
        - sessions:write
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update_state_response'
          description: ''
  /api/trigger_bot:
    post:
      operationId: trigger_bot_message
      description: |-
        Trigger the bot to send a message to the user, or deliver a message directly.

        Provide either ``prompt_text`` (routes through the LLM/bot pipeline) or ``message_text``
        (sends the exact text to the participant without any LLM processing). Exactly one is required.
      summary: Trigger the bot to send a message to the user, or deliver a message
        directly
      tags:
      - Channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerBotMessageRequest'
            examples:
              GenerateBotMessageAndSend:
                value:
                  identifier: '+15556793'
                  experiment: exp1
                  platform: whatsapp
                  prompt_text: Tell the user to do something
                  session_data:
                    key: value
                  participant_data:
                    key: value
                summary: Generates a bot message and sends it to the user (auto-creates
                  participant if needed).
              SendMessageDirectly:
                value:
                  identifier: '+15556793'
                  experiment: exp1
                  platform: whatsapp
                  message_text: Your appointment is confirmed for tomorrow at 10am.
                  session_data:
                    key: value
                  participant_data:
                    key: value
                summary: Send a pre-written message directly to the participant, bypassing
                  the bot/LLM.
              ExperimentChannelNotFound:
                value:
                  detail: Experiment cannot send messages on the connect_messaging
                    channel
                summary: Experiment cannot send messages on the specified channel
              ConsentNotGiven:
                value:
                  detail: User has not given consent
                summary: User has not given consent
        required: true
      security:
      - OAuth2:
        - chatbots:interact
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerBotMessageResponse'
              examples:
                GenerateBotMessageAndSend:
                  value:
                    identifier: '+15556793'
                    experiment: exp1
                    platform: whatsapp
                    prompt_text: Tell the user to do something
                    session_data:
                      key: value
                    participant_data:
                      key: value
                  summary: Generates a bot message and sends it to the user (auto-creates
                    participant if needed).
                SendMessageDirectly:
                  value:
                    identifier: '+15556793'
                    experiment: exp1
                    platform: whatsapp
                    message_text: Your appointment is confirmed for tomorrow at 10am.
                    session_data:
                      key: value
                    participant_data:
                      key: value
                  summary: Send a pre-written message directly to the participant,
                    bypassing the bot/LLM.
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Bad Request
              examples:
                ConsentNotGiven:
                  value:
                    detail: User has not given consent
                  summary: User has not given consent
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Not Found
              examples:
                ExperimentChannelNotFound:
                  value:
                    detail: Experiment cannot send messages on the connect_messaging
                      channel
                  summary: Experiment cannot send messages on the specified channel
          description: ''
  /channels/api/{experiment_id}/incoming_message:
    post:
      operationId: new_api_message
      summary: New API Message
      parameters:
      - in: path
        name: experiment_id
        schema:
          type: string
        description: Experiment ID
        required: true
      tags:
      - Channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiMessage'
        required: true
      security:
      - OAuth2:
        - chatbots:interact
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessage'
          description: ''
  /channels/api/{experiment_id}/v{version}/incoming_message:
    post:
      operationId: new_api_message_versioned
      summary: New API Message Versioned
      parameters:
      - in: path
        name: experiment_id
        schema:
          type: string
        description: Experiment ID
        required: true
      - in: path
        name: version
        schema:
          type: integer
        required: true
      - in: query
        name: version
        schema:
          type: string
        description: Version of experiment
      tags:
      - Channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiMessage'
        required: true
      security:
      - OAuth2:
        - chatbots:interact
      - apiKeyAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessage'
          description: ''
components:
  schemas:
    ApiMessage:
      type: object
      properties:
        message:
          type: string
          title: User message
        session:
          type: string
          title: Optional session ID
      required:
      - message
    ApiResponseAttachment:
      type: object
      properties:
        file_name:
          type: string
        link:
          type: string
      required:
      - file_name
      - link
    ApiResponseMessage:
      type: object
      properties:
        response:
          type: string
          title: AI response
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ApiResponseAttachment'
          title: List of file URLs
      required:
      - attachments
      - response
    ChatCompletionResponseChoices:
      type: object
      properties:
        finish_reason:
          type: string
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatCompletionResponseMessage'
      required:
      - finish_reason
      - index
      - message
    ChatCompletionResponseMessage:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/ChatCompletionResponseMessageRoleEnum'
        content:
          type: string
      required:
      - content
      - role
    ChatCompletionResponseMessageRoleEnum:
      enum:
      - assistant
      type: string
      description: '* `assistant` - assistant'
    ChatPollResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          title: New messages since last poll
        has_more:
          type: boolean
          title: Whether there are more messages to fetch
        session_status:
          allOf:
          - $ref: '#/components/schemas/SessionStatusEnum'
          title: Current session status
      required:
      - has_more
      - messages
      - session_status
    ChatSendMessageRequestWithAttachments:
      type: object
      properties:
        message:
          type: string
          title: Message content
        context:
          type: object
          additionalProperties: {}
          description: Additional context data to include with the message such as
            details about the page the user is on or the action they are trying to
            perform. This is stored in the session state under the `remote_context`
            key.
        attachment_ids:
          type: array
          items:
            type: integer
          description: List of file IDs from prior upload
        version_number:
          type: integer
          nullable: true
          description: Optional version number of the chatbot to use. Requires authentication.
      required:
      - message
    ChatSendMessageResponse:
      type: object
      properties:
        task_id:
          type: string
          description: The ID of the task that is processing the message
        status:
          allOf:
          - $ref: '#/components/schemas/ChatSendMessageResponseStatusEnum'
          title: Processing status
        error:
          type: string
          title: Error message
      required:
      - status
      - task_id
    ChatSendMessageResponseStatusEnum:
      enum:
      - processing
      - completed
      - error
      type: string
      description: |-
        * `processing` - Processing
        * `completed` - Completed
        * `error` - Error
    ChatStartSessionRequest:
      type: object
      properties:
        chatbot_id:
          type: string
          format: uuid
        version_number:
          type: integer
          nullable: true
          description: Optional version number of the chatbot to use. Requires authentication.
        session_data:
          type: object
          additionalProperties: {}
          title: Initial session data
          description: Optional initial state data for the session. This field will
            be ignored if the request is not authenticated.
        participant_remote_id:
          type: string
          default: ''
          description: Optional ID for the participant from remote systems
        participant_name:
          type: string
          title: Paricipant Name
          description: Optional participant name
        use_session_token:
          type: boolean
          nullable: true
          description: Whether to protect the session with a session token (default
            true). When enabled, the response includes a `session_token` which must
            be sent as the `X-Session-Token` header on all subsequent requests for
            this session. Set to false to opt out and rely on legacy access rules.
      required:
      - chatbot_id
    ChatStartSessionResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        session_token:
          type: string
          nullable: true
          description: Present when the session is token-protected. Send as the `X-Session-Token`
            header on all subsequent requests for this session.
        chatbot:
          allOf:
          - $ref: '#/components/schemas/Experiment'
          readOnly: true
        participant:
          allOf:
          - $ref: '#/components/schemas/Participant'
          readOnly: true
      required:
      - chatbot
      - participant
      - session_id
    ChatTaskPoll:
      type: object
      properties:
