          $ref: '#/components/schemas/MessageRoleEnum'
        content:
          type: string
        metadata:
          readOnly: true
          description: |2

            Metadata for the message. Currently documented keys:
              * `compression_marker`: Slug that marks this message as a checkpoint for session history compression
        tags:
          type: array
          items:
            type: string
          readOnly: true
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/File'
          readOnly: true
      required:
      - attachments
      - content
      - created_at
      - metadata
      - role
      - tags
    MessageRoleEnum:
      enum:
      - system
      - user
      - assistant
      type: string
      description: |-
        * `system` - system
        * `user` - user
        * `assistant` - assistant
    ObjectEnum:
      enum:
      - chat.completion
      type: string
      description: '* `chat.completion` - chat.completion'
    PaginatedExperimentList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: https://example.com/api/?cursor=cD00ODY%3D
        previous:
          type: string
          nullable: true
          format: uri
          example: https://example.com/api/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/Experiment'
        count:
          type: integer
          description: Total number of items matching the query. Only present on the
            first page (requests without a cursor).
          example: 123
    PaginatedExperimentSessionList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: https://example.com/api/?cursor=cD00ODY%3D
        previous:
          type: string
          nullable: true
          format: uri
          example: https://example.com/api/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentSession'
        count:
          type: integer
          description: Total number of items matching the query. Only present on the
            first page (requests without a cursor).
          example: 123
    PaginatedParticipantDetailList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: https://example.com/api/?cursor=cD00ODY%3D
        previous:
          type: string
          nullable: true
          format: uri
          example: https://example.com/api/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/ParticipantDetail'
        count:
          type: integer
          description: Total number of items matching the query. Only present on the
            first page (requests without a cursor).
          example: 123
    Participant:
      type: object
      properties:
        identifier:
          type: string
          maxLength: 320
        remote_id:
          type: string
          maxLength: 255
    ParticipantDataEntry:
      type: object
      properties:
        chatbot:
          type: string
          readOnly: true
        chatbot_id:
          type: string
          format: uuid
          readOnly: true
        data: {}
        connect_channel_id:
          type: string
          nullable: true
          readOnly: true
          description: CommCare Connect channel ID. Only set for the CommCare Connect
            channel.
      required:
      - chatbot
      - chatbot_id
      - connect_channel_id
    ParticipantDataUpdateRequest:
      type: object
      properties:
        identifier:
          type: string
          title: Participant Identifier
        name:
          type: string
          title: Participant Name
        platform:
          allOf:
          - $ref: '#/components/schemas/PlatformEnum'
          default: api
          title: Participant Platform
        data:
          type: array
          items:
            $ref: '#/components/schemas/ParticipantExperimentData'
      required:
      - data
      - identifier
    ParticipantDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        identifier:
          type: string
          maxLength: 320
        name:
          type: string
          maxLength: 320
        platform:
          type: string
          maxLength: 32
        remote_id:
          type: string
          maxLength: 255
        data:
          type: array
          items:
            $ref: '#/components/schemas/ParticipantDataEntry'
          readOnly: true
      required:
      - data
      - id
      - platform
    ParticipantExperimentData:
      type: object
      properties:
        experiment:
          type: string
          format: uuid
          title: Experiment ID
        data:
          type: object
          additionalProperties: {}
