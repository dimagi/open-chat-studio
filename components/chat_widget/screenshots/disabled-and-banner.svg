<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="580" viewBox="0 0 1140 580" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <clipPath id="panelClip">
      <rect x="0" y="0" width="340" height="460" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1140" height="580" fill="#98dbcc"/>
  <text x="570" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Open Chat Studio widget — disabled flag &amp; configurable banner</text>

  <!-- ============ Panel 1: disabled + error banner (top) ============ -->
  <text x="200" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">disabled + error banner (top)</text>
  <g transform="translate(30,74)">
    <g clip-path="url(#panelClip)">
      <rect x="0" y="0" width="340" height="460" fill="#ffffff"/>
      <!-- header -->
      <line x1="0" y1="38" x2="340" y2="38" stroke="#f3f4f6" stroke-width="1"/>
      <circle cx="14" cy="16" r="1.4" fill="#6b7280"/><circle cx="14" cy="21" r="1.4" fill="#6b7280"/>
      <circle cx="19" cy="16" r="1.4" fill="#6b7280"/><circle cx="19" cy="21" r="1.4" fill="#6b7280"/>
      <text x="170" y="24" text-anchor="middle" font-size="13" fill="#525762">Support</text>
      <text x="322" y="24" text-anchor="middle" font-size="15" fill="#6b7280">×</text>
      <!-- error banner (top): role=alert -->
      <rect x="0" y="38" width="340" height="46" fill="#fef2f2"/>
      <line x1="0" y1="84" x2="340" y2="84" stroke="#fecaca" stroke-width="1"/>
      <text x="170" y="57" text-anchor="middle" font-size="11" fill="#991b1b">This chat is currently unavailable while we</text>
      <text x="170" y="72" text-anchor="middle" font-size="11" fill="#991b1b">perform scheduled maintenance.</text>
      <!-- messages (read-only history stays visible) -->
      <rect x="14" y="98" width="220" height="42" rx="8" fill="#eae7e8"/>
      <text x="26" y="115" font-size="12" fill="#1f2937">Hi! You can still read our previous</text>
      <text x="26" y="131" font-size="12" fill="#1f2937">conversation below.</text>
      <rect x="150" y="150" width="176" height="26" rx="8" fill="#e4edfb"/>
      <text x="238" y="167" text-anchor="middle" font-size="12" fill="#1f2937">What were the store hours?</text>
      <rect x="14" y="186" width="210" height="26" rx="8" fill="#eae7e8"/>
      <text x="26" y="203" font-size="12" fill="#1f2937">We're open 9am–5pm, Mon–Fri.</text>
      <!-- NO input area — composer hidden & sending blocked -->
      <text x="170" y="444" text-anchor="middle" font-size="10" fill="#64748b">Powered by Dimagi</text>
    </g>
    <rect x="0" y="0" width="340" height="460" rx="10" ry="10" fill="none" stroke="#d1d5db" stroke-width="1"/>
  </g>

  <!-- ============ Panel 2: normal + info banner (bottom) ============ -->
  <text x="570" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">info banner (bottom) — widget stays usable</text>
  <g transform="translate(400,74)">
    <g clip-path="url(#panelClip)">
      <rect x="0" y="0" width="340" height="460" fill="#ffffff"/>
      <!-- header -->
      <line x1="0" y1="38" x2="340" y2="38" stroke="#f3f4f6" stroke-width="1"/>
      <circle cx="14" cy="16" r="1.4" fill="#6b7280"/><circle cx="14" cy="21" r="1.4" fill="#6b7280"/>
      <circle cx="19" cy="16" r="1.4" fill="#6b7280"/><circle cx="19" cy="21" r="1.4" fill="#6b7280"/>
      <text x="170" y="24" text-anchor="middle" font-size="13" fill="#525762">Support</text>
      <text x="322" y="24" text-anchor="middle" font-size="15" fill="#6b7280">×</text>
      <!-- messages -->
      <rect x="14" y="52" width="210" height="26" rx="8" fill="#eae7e8"/>
      <text x="26" y="69" font-size="12" fill="#1f2937">Hi! How can I help you today?</text>
      <rect x="140" y="88" width="186" height="26" rx="8" fill="#e4edfb"/>
      <text x="233" y="105" text-anchor="middle" font-size="12" fill="#1f2937">Do you ship internationally?</text>
      <rect x="14" y="124" width="220" height="26" rx="8" fill="#eae7e8"/>
      <text x="26" y="141" font-size="12" fill="#1f2937">Yes — we ship to most countries.</text>
      <!-- input area (visible) -->
      <rect x="14" y="378" width="250" height="36" rx="8" fill="#ffffff" stroke="#d1d5db"/>
      <text x="24" y="400" font-size="12" fill="#6b7280">Type your message…</text>
      <rect x="270" y="378" width="56" height="36" rx="8" fill="#3b82f6"/>
      <text x="298" y="400" text-anchor="middle" font-size="12" fill="#ffffff">Send</text>
      <!-- powered by -->
      <text x="170" y="426" text-anchor="middle" font-size="10" fill="#64748b">Powered by Dimagi</text>
      <!-- info banner (bottom): role=status -->
      <rect x="0" y="434" width="340" height="26" fill="#eff6ff"/>
      <line x1="0" y1="434" x2="340" y2="434" stroke="#bfdbfe" stroke-width="1"/>
      <text x="170" y="451" text-anchor="middle" font-size="11" fill="#1e40af">By chatting you agree to our terms of service.</text>
    </g>
    <rect x="0" y="0" width="340" height="460" rx="10" ry="10" fill="none" stroke="#d1d5db" stroke-width="1"/>
  </g>

  <!-- ============ Panel 3: normal + warning banner (top) ============ -->
  <text x="940" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">warning banner (top)</text>
  <g transform="translate(770,74)">
    <g clip-path="url(#panelClip)">
      <rect x="0" y="0" width="340" height="460" fill="#ffffff"/>
      <!-- header -->
      <line x1="0" y1="38" x2="340" y2="38" stroke="#f3f4f6" stroke-width="1"/>
      <circle cx="14" cy="16" r="1.4" fill="#6b7280"/><circle cx="14" cy="21" r="1.4" fill="#6b7280"/>
      <circle cx="19" cy="16" r="1.4" fill="#6b7280"/><circle cx="19" cy="21" r="1.4" fill="#6b7280"/>
      <text x="170" y="24" text-anchor="middle" font-size="13" fill="#525762">Support</text>
      <text x="322" y="24" text-anchor="middle" font-size="15" fill="#6b7280">×</text>
      <!-- warning banner (top): role=alert -->
      <rect x="0" y="38" width="340" height="46" fill="#fefce8"/>
      <line x1="0" y1="84" x2="340" y2="84" stroke="#fde68a" stroke-width="1"/>
      <text x="170" y="57" text-anchor="middle" font-size="11" fill="#854d0e">Heads up: responses may be delayed</text>
      <text x="170" y="72" text-anchor="middle" font-size="11" fill="#854d0e">during peak hours.</text>
      <!-- messages -->
      <rect x="14" y="98" width="210" height="26" rx="8" fill="#eae7e8"/>
      <text x="26" y="115" font-size="12" fill="#1f2937">Thanks for waiting — how can I help?</text>
      <rect x="170" y="134" width="156" height="26" rx="8" fill="#e4edfb"/>
      <text x="248" y="151" text-anchor="middle" font-size="12" fill="#1f2937">Where's my order?</text>
      <!-- input area -->
      <rect x="14" y="378" width="250" height="36" rx="8" fill="#ffffff" stroke="#d1d5db"/>
      <text x="24" y="400" font-size="12" fill="#6b7280">Type your message…</text>
      <rect x="270" y="378" width="56" height="36" rx="8" fill="#3b82f6"/>
      <text x="298" y="400" text-anchor="middle" font-size="12" fill="#ffffff">Send</text>
      <text x="170" y="444" text-anchor="middle" font-size="10" fill="#64748b">Powered by Dimagi</text>
    </g>
    <rect x="0" y="0" width="340" height="460" rx="10" ry="10" fill="none" stroke="#d1d5db" stroke-width="1"/>
  </g>
</svg>
