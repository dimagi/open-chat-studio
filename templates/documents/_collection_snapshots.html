<div id="collection-snapshots" class="app-card"
     {% if collection.create_version_task_id %}
       hx-get="{% url 'documents:collection_snapshots' request.team.slug collection.id %}"
       hx-trigger="every 2s"
       hx-swap="outerHTML"
     {% endif %}
>
  <div class="flex justify-between items-center">
    <h2 class="text-lg font-semibold"><i class="fa-regular fa-clock"></i> Snapshots</h2>
    {% if collection.create_version_task_id %}
      <button class="btn btn-sm btn-outline btn-primary no-animation" disabled>
        <span class="loading loading-bars loading-xs"></span> Creating snapshot
      </button>
    {% else %}
      <button class="btn btn-sm btn-outline btn-success"
              hx-post="{% url 'documents:create_collection_version' request.team.slug collection.id %}"
              hx-target="#collection-snapshots"
              hx-swap="outerHTML">
        <i class="fa-regular fa-plus"></i> Create snapshot
      </button>
    {% endif %}
  </div>
  <div class="mt-3 flex flex-col">
    {% for snapshot in collection.versions.all|dictsortreversed:"version_number" %}
      <div class="flex items-center justify-between py-1 border-b border-base-200">
        <span class="text-sm">v{{ snapshot.version_number }} · {{ snapshot.created_at|date:"Y-m-d H:i" }}</span>
        <a class="btn btn-xs btn-ghost"
           href="{% url 'documents:single_collection_home' request.team.slug snapshot.id %}">View</a>
      </div>
    {% empty %}
      <div class="text-sm text-base-content/60">No snapshots yet.</div>
    {% endfor %}
  </div>
</div>
