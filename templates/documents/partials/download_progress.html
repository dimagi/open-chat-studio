{% load static %}

<div class="w-full" id="ocs-download-progress-root">
  <!-- Progress UI -->
  <div id="ocs-progress-panel" class="flex flex-col gap-3 p-4 bg-base-200 rounded-lg">
    <div class="flex items-center gap-2">
      <span class="loading loading-spinner loading-sm"></span>
      <h3 class="font-semibold">Creating ZIP file...</h3>
    </div>

    <div class="progress-wrapper progress w-full bg-base-300 rounded-full overflow-hidden h-4">
      <div
        id="ocs-progress-bar"
        class="progress-bar h-full bg-primary transition-all duration-300 ease-out"
        style="width: 0%"
      ></div>
    </div>

    <div id="ocs-progress-message" class="text-sm text-center text-base-content/70">
      Waiting for progress to start...
    </div>
  </div>

  <!-- Success UI -->
  <div id="ocs-success-panel" class="mt-4" style="display: none;">
    <div class="alert alert-success">
      <i class="fa-solid fa-check-circle"></i>
      <div class="flex-1">
        <h3 class="font-bold">ZIP file ready!</h3>
        <div class="text-sm">Your download is ready.</div>
      </div>
    </div>

    <div class="flex gap-2 mt-4">
      <a id="ocs-download-link" href="#" class="btn btn-primary btn-sm" download>
        <i class="fa-solid fa-download"></i> Download ZIP
      </a>

      <button class="btn btn-outline btn-sm" onclick="location.reload()">
        <i class="fa-solid fa-rotate-right"></i> Done
      </button>
    </div>
  </div>

  <!-- Error UI -->
  <div id="ocs-error-panel" class="mt-4" style="display: none;">
    <div class="alert alert-error">
      <i class="fa-solid fa-exclamation-triangle"></i>
      <div class="flex-1">
        <h3 class="font-bold">Error creating ZIP file</h3>
        <div id="ocs-error-message" class="text-sm">An error occurred while creating the ZIP file.</div>
      </div>
    </div>

    <div class="mt-4">
      <button class="btn btn-outline btn-sm" onclick="location.reload()">
        <i class="fa-solid fa-rotate-right"></i> Try Again
      </button>
    </div>
  </div>
</div>
